<script>
const CHAPTERS={
  1:'01-what-is-nlp.html',
  2:'02-text-preprocessing.html',
  3:'03-representing-text.html',
  4:'04-text-classification.html',
  5:'05-sequence-labeling.html',

  10:'10-modern-nlp-landscape.html'
};

const TERMS=[
  {t:'Attention (Self-Attention)',d:'A mechanism that lets each token in a sequence compute a weighted sum of all other tokens, determining how much to "attend" to each. The core innovation of the Transformer architecture, replacing recurrence with parallelizable pairwise comparisons.',ch:[7,10]},
  {t:'Autoregressive Generation',d:'Generating text one token at a time, where each new token is conditioned on all previously generated tokens. The approach used by GPT and all decoder-only language models.',ch:[6,7]},
  {t:'Bag of Words (BoW)',d:'A text representation that counts word occurrences while ignoring order. Simple and effective for many classification tasks, but loses all sequential and syntactic information.',ch:[3,4]},
  {t:'Beam Search',d:'A decoding strategy that maintains the top-k most probable partial sequences at each step, balancing quality with diversity. Commonly used in machine translation and summarization.',ch:[6]},
  {t:'BERT (Bidirectional Encoder Representations from Transformers)',d:'A pre-trained encoder-only transformer that uses masked language modeling to build bidirectional context representations. Revolutionized NLP by enabling fine-tuning for classification, NER, QA, and more.',ch:[3,4,5,7,8]},
  {t:'BERTScore',d:'An evaluation metric that computes cosine similarity between BERT embeddings of generated and reference tokens. Captures semantic similarity that n-gram metrics like BLEU miss.',ch:[9]},
  {t:'BIOES Tagging',d:'An extension of IOB tagging that adds Single (S) and End (E) tags for more precise entity boundary marking. Slightly improves NER performance over IOB2 in some settings.',ch:[5]},
  {t:'BiLSTM-CRF',d:'An architecture combining a bidirectional LSTM (for contextual token representations) with a Conditional Random Field (for enforcing valid tag sequences). The dominant NER architecture before transformers.',ch:[5]},
  {t:'BLEU (Bilingual Evaluation Understudy)',d:'A precision-based metric that measures n-gram overlap between generated text and reference translations. The standard automatic metric for machine translation, though it misses semantic equivalence.',ch:[9]},
  {t:'BPE (Byte Pair Encoding)',d:'A subword tokenization algorithm that iteratively merges the most frequent character pairs. Used by GPT models. Handles rare and compound words by breaking them into known subword units.',ch:[2,7]},
  {t:'Catastrophic Forgetting',d:'The tendency of a neural network to lose previously learned knowledge when fine-tuned on new data. Mitigated by low learning rates, gradual unfreezing, or parameter-efficient methods like LoRA.',ch:[8]},
  {t:'Chain-of-Thought (CoT)',d:'A prompting technique that asks models to show their reasoning step by step before giving a final answer. Improves accuracy on complex reasoning tasks by 20\u201340%.',ch:[10]},
  {t:'Conditional Random Field (CRF)',d:'A discriminative sequence model that scores entire label sequences rather than individual labels. Enforces global constraints (e.g., I-PER cannot follow B-ORG) that local classifiers miss.',ch:[5]},
  {t:'Constitutional AI',d:'An alignment approach (Anthropic) that defines principles the model should follow and uses self-critique to enforce them. Enables scalable alignment without per-output human feedback.',ch:[10]},
  {t:'Contextual Embeddings',d:'Word representations that change based on surrounding context, so the same word gets different vectors in different sentences. ELMo and BERT produce contextual embeddings, unlike static Word2Vec.',ch:[3,7]},
  {t:'Cosine Similarity',d:'A measure of similarity between two vectors based on the angle between them, ranging from \u22121 (opposite) to 1 (identical). The standard metric for comparing word and sentence embeddings.',ch:[3,9]},
  {t:'Cross-Lingual Transfer',d:'Using a model trained on one language (typically English) to perform tasks in another language without target-language training data. Enabled by multilingual models like mBERT and XLM-RoBERTa.',ch:[10]},
  {t:'Data Leakage',d:'When information from the test set inadvertently influences training, producing artificially inflated metrics. In NLP, common sources include overlapping documents and temporal leakage in time-series text.',ch:[4,9]},
  {t:'Decoder-Only Transformer',d:'A transformer variant that uses causal (left-to-right) attention for autoregressive text generation. The architecture behind GPT, LLaMA, and most modern LLMs.',ch:[7,10]},
  {t:'Domain Adaptation',d:'Continuing pre-training on domain-specific text (e.g., biomedical, legal, financial) before fine-tuning on a downstream task. Produces models like BioBERT and SciBERT that outperform general BERT on specialized tasks.',ch:[8]},
  {t:'DPO (Direct Preference Optimization)',d:'A simpler alternative to RLHF that directly optimizes a language model on preference pairs without training a separate reward model. Increasingly used in modern alignment pipelines.',ch:[10]},
  {t:'ELMo (Embeddings from Language Models)',d:'The first widely adopted contextual embedding model (2018), using a bidirectional LSTM to generate context-dependent word representations. Preceded and inspired BERT.',ch:[3,7]},
  {t:'Encoder-Decoder Transformer',d:'A transformer with both an encoder (for input understanding) and a decoder (for output generation). Used for sequence-to-sequence tasks like translation and summarization. T5 and BART are examples.',ch:[7]},
  {t:'Encoder-Only Transformer',d:'A transformer variant that processes the full input bidirectionally, producing rich contextual representations. Optimized for understanding tasks (classification, NER, QA). BERT is the canonical example.',ch:[7,8]},
  {t:'Entity-Level F1',d:'The standard evaluation metric for NER that requires both the entity boundary and type to be exactly correct. Stricter than token-level F1 and more reflective of real-world performance.',ch:[5,9]},
  {t:'F1 Score',d:'The harmonic mean of precision and recall, providing a single metric that balances both. Preferred over accuracy for imbalanced datasets. Variants: macro (per-class average), micro (global), weighted.',ch:[4,5,9]},
  {t:'fastText',d:'A word embedding model (Facebook, 2016) that represents words as sums of character n-gram vectors. Handles out-of-vocabulary words and morphologically rich languages better than Word2Vec.',ch:[3]},
  {t:'Feature Extraction',d:'A transfer learning strategy that freezes the pre-trained model and trains only a new classifier head on top. Faster and more stable than full fine-tuning, but less adaptable to the target task.',ch:[8]},
  {t:'Few-Shot Learning',d:'Solving NLP tasks by providing a handful of examples in the prompt, without any gradient updates. Enabled by large language models like GPT-3 that can learn task patterns from in-context examples.',ch:[10]},
  {t:'Fine-Tuning',d:'Updating the weights of a pre-trained model on task-specific labeled data. The standard approach for adapting BERT, GPT, and other pre-trained models to downstream NLP tasks.',ch:[4,5,7,8]},
  {t:'GloVe (Global Vectors)',d:'A word embedding model (Stanford, 2014) that combines global co-occurrence statistics with local context windows. Produces vectors where word analogies emerge as linear relationships.',ch:[3]},
  {t:'GPT (Generative Pre-trained Transformer)',d:'A family of decoder-only transformer models (OpenAI) trained with causal language modeling. GPT-2 demonstrated impressive text generation; GPT-3 introduced few-shot in-context learning at scale.',ch:[7,10]},
  {t:'Greedy Decoding',d:'The simplest text generation strategy: always pick the highest-probability token at each step. Fast but often produces repetitive, low-quality text compared to sampling-based methods.',ch:[6]},
  {t:'Hidden Markov Model (HMM)',d:'A generative probabilistic model for sequences that assumes hidden states (tags) emit observable outputs (words) with transition probabilities between states. Used for POS tagging and early NER.',ch:[5]},
  {t:'Hugging Face',d:'The dominant open-source ecosystem for NLP, providing the Transformers library, Model Hub (1M+ models), Datasets, Tokenizers, PEFT, and Trainer API. The standard toolkit for modern NLP development.',ch:[8]},
  {t:'In-Context Learning',d:'The ability of large language models to learn new tasks from examples provided in the prompt, without any parameter updates. A key emergent capability of models at sufficient scale.',ch:[10]},
  {t:'Inference-Time Scaling',d:'Allocating more compute during inference (longer reasoning chains, multiple attempts) rather than during training (bigger models). Models like o1 trade latency for accuracy on complex tasks.',ch:[10]},
  {t:'Instruction Tuning',d:'Fine-tuning a language model on (instruction, response) pairs to teach it to follow diverse instructions. The key step that transforms a raw language model into a useful assistant.',ch:[10]},
  {t:'IOB Tagging',d:'A labeling scheme for sequence labeling where B marks the beginning of an entity, I marks inside tokens, and O marks outside. The standard format for encoding entity boundaries in NER.',ch:[5]},
  {t:'Lemmatization',d:'Reducing words to their dictionary form (lemma) using morphological analysis: "better" \u2192 "good", "ran" \u2192 "run". More accurate than stemming but requires linguistic knowledge.',ch:[2]},
  {t:'LLM-as-Judge',d:'Using a large language model to evaluate the quality of generated text, as a scalable proxy for human evaluation. Correlates well with human judgments for many tasks but can inherit model biases.',ch:[9]},
  {t:'Logistic Regression',d:'A linear classifier that models the probability of class membership. Combined with TF-IDF features, it remains a strong baseline for text classification, especially with limited labeled data.',ch:[4]},
  {t:'LoRA (Low-Rank Adaptation)',d:'A parameter-efficient fine-tuning method that injects small trainable low-rank matrices into transformer layers. Achieves 90\u201395% of full fine-tuning performance while training only 0.1\u20131% of parameters.',ch:[8]},
  {t:'LSTM (Long Short-Term Memory)',d:'A recurrent neural network variant with gating mechanisms (forget, input, output gates) that solve the vanishing gradient problem. Dominated NLP from 2015\u20132018 before transformers.',ch:[6,7]},
  {t:'Macro F1',d:'F1 score computed per class and then averaged, giving equal weight to every class regardless of size. Preferred when all classes are equally important, even rare ones.',ch:[4,9]},
  {t:'Masked Language Modeling (MLM)',d:'A pre-training objective where random tokens are masked and the model predicts them from bidirectional context. The core training objective for BERT and other encoder-only transformers.',ch:[7,8]},
  {t:'Micro F1',d:'F1 score computed globally by aggregating all true positives, false positives, and false negatives across classes. Equivalent to accuracy when every sample has exactly one label.',ch:[4,9]},
  {t:'Multi-Head Attention',d:'Running multiple self-attention operations in parallel, each with different learned projections. Allows the model to attend to different types of relationships (syntactic, semantic, positional) simultaneously.',ch:[7]},
  {t:'Multilingual Model',d:'A model trained on text from many languages simultaneously (e.g., mBERT on 104 languages, XLM-RoBERTa on 100). Develops cross-lingual representations that enable zero-shot transfer across languages.',ch:[10]},
  {t:'Naive Bayes',d:'A probabilistic classifier based on Bayes\' theorem with a strong independence assumption between features. Fast, interpretable, and surprisingly effective for text classification, especially with small datasets.',ch:[4]},
  {t:'Named Entity Recognition (NER)',d:'The task of identifying and classifying named entities (persons, organizations, locations, dates) in text. A fundamental NLP task for information extraction, typically framed as sequence labeling.',ch:[1,5]},
  {t:'N-gram',d:'A contiguous sequence of n tokens from text. Unigrams (n=1), bigrams (n=2), trigrams (n=3). Used in language models, text features, and evaluation metrics like BLEU.',ch:[3,4,6,9]},
  {t:'Normalization (Text)',d:'Standardizing text by lowercasing, expanding contractions, handling Unicode, removing accents, and converting numbers. Reduces vocabulary size and improves model consistency.',ch:[2]},
  {t:'Nucleus Sampling (Top-p)',d:'A decoding strategy that samples from the smallest set of tokens whose cumulative probability exceeds a threshold p. Dynamically adjusts the candidate pool size, producing diverse yet coherent text.',ch:[6]},
  {t:'One-Hot Encoding',d:'Representing each word as a binary vector with a single 1 at the word\'s index position. Simple but extremely sparse, high-dimensional, and captures no semantic relationships between words.',ch:[3]},
  {t:'PEFT (Parameter-Efficient Fine-Tuning)',d:'A family of methods (LoRA, adapters, prefix tuning) that fine-tune only a small fraction of model parameters. Reduces compute, memory, and storage costs while maintaining most of the performance.',ch:[8]},
  {t:'Perplexity',d:'A metric measuring how surprised a language model is by test data, computed as the exponentiated average negative log-likelihood. Lower perplexity means better predictions. The standard intrinsic LM metric.',ch:[6]},
  {t:'POS Tagging (Part-of-Speech)',d:'Assigning grammatical categories (noun, verb, adjective, etc.) to each word in a sentence. One of the oldest and most fundamental NLP tasks, typically solved as sequence labeling.',ch:[1,5]},
  {t:'Positional Encoding',d:'Information added to token embeddings to encode sequence position, since transformers have no inherent notion of order. Original Transformer uses sinusoidal functions; modern models often use learned or rotary encodings.',ch:[7]},
  {t:'Precision',d:'The fraction of predicted positives that are actually positive: TP / (TP + FP). High precision means few false alarms. Important when the cost of false positives is high.',ch:[4,5,9]},
  {t:'Prompt Engineering',d:'The practice of designing inputs (prompts) that guide language models to produce desired outputs. Includes techniques like few-shot examples, chain-of-thought, system prompts, and output format specification.',ch:[10]},
  {t:'RAG (Retrieval-Augmented Generation)',d:'An architecture that retrieves relevant documents from a knowledge base and includes them in the prompt before generation. Reduces hallucination and enables access to current information without retraining.',ch:[10]},
  {t:'Recall',d:'The fraction of actual positives that were correctly identified: TP / (TP + FN). High recall means few missed cases. Important when the cost of false negatives is high.',ch:[4,5,9]},
  {t:'RLHF (Reinforcement Learning from Human Feedback)',d:'A training technique that uses human preference judgments to train a reward model, then optimizes the language model to maximize that reward. The key alignment technique behind ChatGPT and similar assistants.',ch:[10]},
  {t:'RNN (Recurrent Neural Network)',d:'A neural network that processes sequences by maintaining a hidden state updated at each time step. Captures sequential dependencies but suffers from vanishing gradients on long sequences.',ch:[6]},
  {t:'ROUGE (Recall-Oriented Understudy for Gisting Evaluation)',d:'A family of recall-based metrics for evaluating summaries. ROUGE-1 (unigram overlap), ROUGE-2 (bigram overlap), and ROUGE-L (longest common subsequence) are the most common variants.',ch:[9]},
  {t:'Self-Consistency',d:'A decoding strategy that generates multiple chain-of-thought reasoning paths and takes a majority vote on the final answer. Reduces random errors in reasoning tasks.',ch:[10]},
  {t:'SentencePiece',d:'A language-independent tokenizer that treats the input as a raw byte stream, requiring no pre-tokenization. Supports both BPE and unigram models. Used by T5, LLaMA, and multilingual models.',ch:[2]},
  {t:'Sequence Labeling',d:'The task of assigning a label to every token in a sequence. Encompasses POS tagging, NER, and chunking. Models must capture both token-level features and inter-token dependencies.',ch:[5]},
  {t:'Stemming',d:'Reducing words to their root form by stripping suffixes: "running" \u2192 "run", "studies" \u2192 "studi". Fast but crude \u2014 often produces non-words. Porter Stemmer is the most widely used algorithm.',ch:[2]},
  {t:'Stop Words',d:'High-frequency words (the, is, at, which) that carry little semantic content. Removing them reduces noise for classical models but can harm transformer models that use them for syntactic understanding.',ch:[2]},
  {t:'Structured Generation',d:'Constraining language model output to valid formats (JSON, SQL, code) through constrained decoding. Makes LLMs reliable components in software systems by guaranteeing output structure.',ch:[10]},
  {t:'Subword Tokenization',d:'Breaking words into smaller units (sub-words) to handle rare and compound words. BPE, WordPiece, and SentencePiece are the main algorithms. Solved the out-of-vocabulary problem.',ch:[2]},
  {t:'SVM (Support Vector Machine)',d:'A classifier that finds the maximum-margin hyperplane separating classes. With kernel tricks, SVMs handle non-linear boundaries. Strong for text classification with moderate-sized datasets.',ch:[4]},
  {t:'T5 (Text-to-Text Transfer Transformer)',d:'An encoder-decoder transformer (Google) that frames every NLP task as text-to-text: input text \u2192 output text. Unifies classification, translation, summarization, and QA under one architecture.',ch:[7,8]},
  {t:'Temperature',d:'A parameter that controls the randomness of text generation by scaling logits before softmax. Low temperature (\u22640.3) produces focused, deterministic text; high temperature (\u22651.0) produces diverse, creative text.',ch:[6]},
  {t:'TF-IDF (Term Frequency\u2013Inverse Document Frequency)',d:'A text representation that weights words by how frequent they are in a document relative to the corpus. Downweights common words and highlights distinctive terms. A strong baseline feature for classification.',ch:[3,4]},
  {t:'Tokenization',d:'Splitting text into discrete units (tokens) for model processing. Word-level tokenization splits on whitespace; subword methods (BPE, WordPiece) balance vocabulary size with coverage.',ch:[2]},
  {t:'Top-k Sampling',d:'A decoding strategy that restricts sampling to the k most probable tokens at each step. Prevents low-probability tokens from being selected while maintaining diversity.',ch:[6]},
  {t:'Transfer Learning',d:'The paradigm of pre-training a model on a large general corpus and then fine-tuning it on a smaller task-specific dataset. Revolutionized NLP by making state-of-the-art accessible without massive compute.',ch:[7,8]},
  {t:'Transformer',d:'A neural network architecture based entirely on self-attention mechanisms, introduced in "Attention Is All You Need" (Vaswani et al., 2017). Replaced RNNs and CNNs as the dominant NLP architecture.',ch:[7,8,10]},
  {t:'Vanishing Gradient',d:'The problem where gradients shrink exponentially as they propagate through many layers or time steps, preventing the network from learning long-range dependencies. Solved by LSTMs and later by transformers.',ch:[6]},
  {t:'Word2Vec',d:'A neural embedding model (Mikolov et al., 2013) that learns dense word vectors from local context windows. Demonstrated that word relationships are encoded as vector arithmetic (king \u2212 man + woman \u2248 queen).',ch:[3]},
  {t:'WordPiece',d:'A subword tokenization algorithm (used by BERT) that greedily selects merges maximizing the likelihood of the training corpus. Similar to BPE but uses a different merge criterion.',ch:[2,7]},
  {t:'Zero-Shot Learning',d:'Solving NLP tasks with just an instruction and no examples. Instruction-tuned models can perform classification, extraction, and generation tasks they were never explicitly trained on.',ch:[10]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script></body>
</html>
