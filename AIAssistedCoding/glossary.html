<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--teal-light) 0%,var(--blue-light) 40%,var(--slate-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--teal);padding:4px 12px;background:var(--teal-light);border:1px solid var(--teal-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}
.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--teal)}.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}
.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--teal-light);color:var(--teal)}.alpha-btn.active{background:var(--teal);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--teal);padding-bottom:8px;border-bottom:2px solid var(--teal-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--teal-light);color:var(--teal);border:1px solid var(--teal-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--teal);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}

<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div><h1>AI Glossary</h1><div class="tb-sub">Core terminology and definitions from the AI-Assisted Coding course.</div></div>

  <div class="alpha-bar" id="alpha-bar"></div>
  <div class="glossary-body" id="glossary-body"></div>

</div>
<script>
const CHAPTERS={1:'01-ai-coding-revolution.html',2:'02-how-code-llms-work.html',3:'03-training-code-models.html',4:'04-ai-coding-landscape.html',5:'05-code-completion-anatomy.html',6:'06-agent-loop.html',7:'07-context-engineering.html',8:'08-prompt-driven-development.html',9:'09-vibe-coding.html',10:'10-multi-file-refactoring.html',11:'11-testing-debugging.html',12:'12-security-quality.html',13:'13-best-practices.html',14:'14-future-of-ai-dev.html'};
const TERMS=[
  {t:'Agent Loop (ReAct)',d:'The core cycle of AI coding agents: Reason about the task, Act by calling a tool (edit file, run terminal, search), Observe the result, and repeat until the task is complete.',ch:[6]},
  {t:'Agentic Refactoring',d:'Using AI agents to perform complex, multi-file code changes that require understanding project structure, dependencies, and cross-file relationships.',ch:[10]},
  {t:'Code Completion',d:'The foundational AI coding feature where the model predicts and suggests the next tokens of code as you type. Uses Fill-in-the-Middle (FIM) to complete code at the cursor position.',ch:[5]},
  {t:'Code LLM',d:'A large language model specifically trained or fine-tuned on source code. Examples include Codex, StarCoder, DeepSeek-Coder, and CodeLlama.',ch:[2]},
  {t:'Context Engineering',d:'The practice of strategically selecting and providing the right information (files, docs, examples) to an AI coding tool to maximize the quality of its output.',ch:[7]},
  {t:'Context Window',d:'The maximum amount of text (measured in tokens) that an LLM can process in a single request. Larger windows allow more code context but increase cost and latency.',ch:[2,7]},
  {t:'Copilot',d:'GitHub Copilot — the first widely adopted AI coding assistant, powered by OpenAI Codex. Pioneered inline code completion and set the standard for AI-assisted development.',ch:[4]},
  {t:'Cursor',d:'An AI-native code editor built on VS Code that deeply integrates AI into the development workflow with features like Cmd+K editing, multi-file agents, and context-aware completions.',ch:[4]},
  {t:'FIM (Fill-in-the-Middle)',d:'A training and inference technique where the model is given code before and after the cursor position and must predict what goes in the middle. Essential for accurate code completion.',ch:[2,5]},
  {t:'Hallucination (Code)',d:'When an AI generates code that references non-existent APIs, libraries, functions, or parameters. Particularly dangerous because the code may look syntactically correct but fail at runtime.',ch:[12]},
  {t:'HumanEval',d:'A benchmark for evaluating code generation models. Contains 164 Python programming problems with test cases. Models are scored on pass@k — the probability of generating a correct solution in k attempts.',ch:[3]},
  {t:'Inline Completion',d:'Real-time code suggestions that appear as ghost text at the cursor position. The most common AI coding interaction — accept with Tab, reject by continuing to type.',ch:[5]},
  {t:'LSP (Language Server Protocol)',d:'A protocol that provides code intelligence (diagnostics, completions, go-to-definition) to editors. AI coding tools use LSP data as context to improve suggestion quality.',ch:[5,7]},
  {t:'Multi-File Edit',d:'AI-assisted changes that span multiple files simultaneously, maintaining consistency across imports, interfaces, and implementations. Requires the agent to understand project structure.',ch:[10]},
  {t:'Pass@k',d:'A code generation metric measuring the probability that at least one of k generated solutions passes all test cases. pass@1 measures first-attempt accuracy.',ch:[3]},
  {t:'Prompt-Driven Development',d:'A development methodology where natural language descriptions drive code generation. Write what you want in comments or chat, and the AI generates the implementation.',ch:[8]},
  {t:'RAG for Code',d:'Retrieval-Augmented Generation applied to coding: the AI retrieves relevant code snippets, documentation, and examples from your codebase to inform its suggestions.',ch:[7]},
  {t:'SAST (Static Application Security Testing)',d:'Automated analysis of source code for security vulnerabilities without executing it. AI coding tools should be paired with SAST to catch security issues in generated code.',ch:[12]},
  {t:'SWE-bench',d:'A benchmark that tests AI on real-world software engineering tasks from GitHub issues. Models must generate code patches that resolve actual bugs and pass existing test suites.',ch:[3]},
  {t:'Token',d:'The basic unit of text processing for LLMs. In code, tokens roughly correspond to keywords, operators, identifiers, and whitespace. A line of code is typically 5-15 tokens.',ch:[2]},
  {t:'Tree-sitter',d:'A parser generator tool that creates fast, incremental parsers for programming languages. Used by AI coding tools to understand code structure and provide syntax-aware context.',ch:[5,7]},
  {t:'Vibe Coding',d:'A development approach where the developer describes intent at a high level and lets AI handle most of the implementation details, iterating through conversation rather than manual coding.',ch:[9]}
];
TERMS.sort((a,b)=>a.t.localeCompare(b.t));
const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');const alphaBar=document.getElementById('alpha-bar');const body=document.getElementById('glossary-body');const searchInput=document.getElementById('search-input');const searchCount=document.getElementById('search-count');const noResults=document.getElementById('no-results');const totalCount=document.getElementById('total-count');totalCount.textContent=`${TERMS.length} Terms`;
ALPHABET.forEach(letter=>{const btn=document.createElement('button');btn.className='alpha-btn';btn.textContent=letter;const hasTerms=TERMS.some(t=>t.t.toUpperCase().startsWith(letter));if(!hasTerms)btn.classList.add('disabled');btn.addEventListener('click',()=>{if(btn.classList.contains('disabled'))return;document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');searchInput.value='';buildGlossary(letter,true);});alphaBar.appendChild(btn);});
const allBtn=document.createElement('button');allBtn.className='alpha-btn active';allBtn.style.width='auto';allBtn.style.padding='0 10px';allBtn.textContent='ALL';allBtn.addEventListener('click',()=>{document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));allBtn.classList.add('active');searchInput.value='';buildGlossary('');});alphaBar.insertBefore(allBtn,alphaBar.firstChild);
function makeRef(chNum){const a=document.createElement('a');a.className='term-ref';a.href=CHAPTERS[chNum]||'#';a.textContent=`Ch ${chNum}`;return a;}
function buildGlossary(filter,isExactLetter=false){body.innerHTML='';const f=filter.toLowerCase();let filtered=TERMS;if(f){if(isExactLetter){filtered=TERMS.filter(t=>t.t.toLowerCase().startsWith(f));}else{filtered=TERMS.filter(t=>t.t.toLowerCase().includes(f)||t.d.toLowerCase().includes(f));document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));}}if(filtered.length===0){noResults.style.display='block';searchCount.textContent='0 matches';return;}noResults.style.display='none';if(f&&!isExactLetter){searchCount.textContent=`${filtered.length} match${filtered.length===1?'':'es'}`;}else{searchCount.textContent='';}let currentLetter='';let currentSection=null;filtered.forEach(term=>{const firstLetter=term.t.charAt(0).toUpperCase();if(firstLetter!==currentLetter){currentLetter=firstLetter;currentSection=document.createElement('div');currentSection.className='letter-section';const h=document.createElement('div');h.className='letter-head';h.textContent=currentLetter;currentSection.appendChild(h);body.appendChild(currentSection);}const row=document.createElement('div');row.className='term-row';const name=document.createElement('div');name.className='term-name';const bd=document.createElement('div');bd.className='term-body';const def=document.createElement('div');def.className='term-def';if(f&&!isExactLetter){const regex=new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');def.innerHTML=term.d.replace(regex,'<strong>$1</strong>');name.innerHTML=term.t.replace(regex,'<strong>$1</strong>');}else{def.textContent=term.d;name.textContent=term.t;}const refs=document.createElement('div');refs.className='term-refs';term.ch.forEach(c=>refs.appendChild(makeRef(c)));bd.appendChild(def);bd.appendChild(refs);row.appendChild(name);row.appendChild(bd);currentSection.appendChild(row);});}
buildGlossary('');let debounce=null;searchInput.addEventListener('input',()=>{clearTimeout(debounce);debounce=setTimeout(()=>buildGlossary(searchInput.value),150);});
</script>
