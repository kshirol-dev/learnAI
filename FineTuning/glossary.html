<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--pink-light) 0%,var(--violet-light) 40%,var(--slate-light) 100%)}

.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--pink)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}

.alpha-btn:hover{background:var(--pink-light);color:var(--pink)}.alpha-btn.active{background:var(--pink);color:#fff}

.glossary-body{padding:0 36px 24px}

.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--pink);padding-bottom:8px;border-bottom:2px solid var(--pink-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}

.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--pink-light);color:var(--pink);border:1px solid var(--pink-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--pink);color:#fff}

<div class="canvas">

      <h1>AI Glossary</h1>

    </div>
    <div class="tb-count" id="total-count">0 Terms</div>

      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'LoRA', 'RLHF')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>

  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>

</div>

<script>
const CHAPTERS={
  1:'01-what-is-fine-tuning-high-level.html',
  2:'02-transformer-architecture-high-level.html',
  3:'03-dataset-preparation-high-level.html',
  4:'04-lora-peft-high-level.html',
  5:'05-full-fine-tuning-high-level.html',
  6:'06-rlhf-reward-models-high-level.html',
  7:'07-dpo-orpo-high-level.html',
  8:'08-infrastructure-tools-high-level.html',
  9:'09-evaluation-benchmarks-high-level.html',
  10:'10-production-deployment-high-level.html'
};

const TERMS=[
  {t:'Alignment Tax',d:'The phenomenon where making a model safer and more aligned with human values (via RLHF/DPO) slightly degrades its performance on objective tasks like coding, math, or reasoning.',ch:[6]},
  {t:'Axolotl',d:'A popular open-source framework that provides a configuration-driven approach to fine-tuning LLMs, standardizing the process across different models and hardware setups.',ch:[8]},
  {t:'Base Model',d:'A foundation model that has only undergone pre-training on a massive corpus of text to predict the next word. It is not yet trained to follow instructions or act as a chatbot.',ch:[1]},
  {t:'Catastrophic Forgetting',d:'A phenomenon where a neural network completely forgets previously learned information (general knowledge) upon learning new information (the fine-tuning task).',ch:[9]},
  {t:'ChatML',d:'A standard data format used for fine-tuning conversational models, explicitly defining roles like <|im_start|>system, <|im_start|>user, and <|im_start|>assistant.',ch:[3]},
  {t:'DPO (Direct Preference Optimization)',d:'A modern alignment technique that simplifies RLHF by treating the LLM itself as the reward model, directly updating weights based on human preference data without needing a separate reward model or PPO.',ch:[7]},
  {t:'FSDP (Fully Sharded Data Parallel)',d:'A PyTorch feature that shards model weights, gradients, and optimizer states across multiple GPUs, allowing the training of models that are much larger than the memory of a single GPU.',ch:[5]},
  {t:'Gradient Checkpointing',d:'A memory-saving technique during training that discards intermediate activations during the forward pass and recalculates them during the backward pass, trading compute time for memory.',ch:[5]},
  {t:'Instruct Model',d:'A base model that has undergone Supervised Fine-Tuning (SFT) to understand and follow user instructions, formatting its outputs as a helpful assistant.',ch:[1,6]},
  {t:'LoRA (Low-Rank Adaptation)',d:'A Parameter-Efficient Fine-Tuning (PEFT) technique that freezes the pre-trained model weights and injects trainable rank decomposition matrices (adapters) into each layer, drastically reducing the number of trainable parameters.',ch:[4]},
  {t:'Model Merging',d:'The process of mathematically fusing the weights of a trained LoRA adapter directly into the base model\'s weights, resulting in a single model that incurs no latency penalty during inference.',ch:[10]},
  {t:'ORPO (Odds Ratio Preference Optimization)',d:'A cutting-edge alignment technique that combines Supervised Fine-Tuning (SFT) and Preference Optimization into a single, unified training step, eliminating the need for a multi-stage pipeline.',ch:[7]},
  {t:'PEFT (Parameter-Efficient Fine-Tuning)',d:'An umbrella term for techniques (like LoRA, Prefix Tuning, IA3) that fine-tune a small number of extra parameters while freezing most of the pre-trained network, saving memory and compute.',ch:[4]},
  {t:'PPO (Proximal Policy Optimization)',d:'The reinforcement learning algorithm traditionally used in the final stage of RLHF to optimize the LLM\'s policy based on the scores provided by the Reward Model.',ch:[6]},
  {t:'QLoRA',d:'An extension of LoRA that quantizes the frozen base model to 4-bit precision while training the adapters in 16-bit precision, allowing massive models (like 70B parameters) to be fine-tuned on consumer hardware.',ch:[4]},
  {t:'Reward Model',d:'In RLHF, a separate neural network trained on human preference data (A is better than B) to act as an automated judge, scoring the outputs of the main LLM during reinforcement learning.',ch:[6]},
  {t:'RLHF (Reinforcement Learning from Human Feedback)',d:'A multi-stage training process used to align LLMs with human values and preferences, typically involving SFT, training a Reward Model, and optimizing via PPO.',ch:[6]},
  {t:'SFT (Supervised Fine-Tuning)',d:'The process of training a base model on high-quality, human-curated examples of prompts and ideal responses to teach it how to follow instructions and format its output.',ch:[1,6]},
  {t:'Synthetic Data',d:'Training data generated by a larger, more capable AI model (like GPT-4) rather than humans. Widely used to create high-quality datasets for fine-tuning smaller, open-source models.',ch:[3]},
  {t:'Unsloth',d:'A highly optimized, open-source library that rewrites the core math of LoRA fine-tuning in Triton, making the process up to 2x faster and using significantly less GPU memory.',ch:[8]}
];

// Sort terms alphabetically
TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

// Build Alphabet Bar
ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }

  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }

  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }

  let currentLetter = '';
  let currentSection = null;

  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }

    const row = document.createElement('div');
    row.className = 'term-row';

    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;

    const bd = document.createElement('div');
    bd.className = 'term-body';

    const def = document.createElement('div');
    def.className = 'term-def';
    
    // Highlight search term if applicable
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }

    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));

    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
