<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--amber-light) 0%,var(--orange-light) 40%,var(--slate-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--amber);padding:4px 12px;background:var(--amber-light);border:1px solid var(--amber-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}
.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--amber)}.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}
.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--amber-light);color:var(--amber)}.alpha-btn.active{background:var(--amber);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--amber);padding-bottom:8px;border-bottom:2px solid var(--amber-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--amber);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}

<body>
<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div>
      <h1>AI Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the LLM Evaluation &amp; Observability course.</div>
    </div>
    <div class="tb-count" id="total-count">0 Terms</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-link"><span class="material-symbols-rounded">arrow_back</span> Back to Course</a>
    <a href="../index.html" class="nav-link"><span class="material-symbols-rounded">home</span> Learning Portal</a>
    <a href="key-insights.html" class="nav-link"><span class="material-symbols-rounded">summarize</span> View Key Insights</a>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'Faithfulness', 'Guardrail')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>
  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>
</div>

<script>
const CHAPTERS={
  1:'01-why-evaluation-matters.html',2:'02-benchmarks.html',3:'03-llm-as-judge.html',
  4:'04-evaluating-rag.html',5:'05-evaluating-agents.html',6:'06-human-evaluation.html',
  7:'07-eval-pipeline.html',8:'08-eval-tools.html',9:'09-production-observability.html',
  10:'10-guardrails-safety.html',11:'11-drift-debugging.html',12:'12-eval-first-mindset.html'
};

const TERMS=[
  {t:'A/B Testing',d:'A controlled experiment where two variants (e.g., different prompts or models) are deployed to separate user groups simultaneously. Comparing metrics across groups reveals which variant performs better in production.',ch:[11]},
  {t:'Annotation Guidelines',d:'A detailed rubric that defines evaluation criteria, score definitions with examples, edge case handling, and disagreement protocols for human annotators. Good guidelines are the single biggest factor in evaluation quality.',ch:[6]},
  {t:'Arize Phoenix',d:'An open-source LLM observability platform from Arize AI. Provides trace viewing, embedding visualization, LLM judge evaluation, and dataset curation from production traces.',ch:[8]},
  {t:'Baseline',d:'A reference score against which new results are compared. Types include current production, previous version, human performance (ceiling), and random/naive (floor). Scores without baselines are meaningless.',ch:[7]},
  {t:'Benchmark',d:'A standardized test suite used to evaluate and compare LLM capabilities. Examples include MMLU (knowledge), HumanEval (coding), SWE-bench (real-world engineering), and GPQA (expert reasoning).',ch:[2]},
  {t:'Benchmark Saturation',d:'When models achieve near-perfect scores on a benchmark, making it no longer useful for differentiation. Saturated benchmarks are replaced by harder ones (e.g., MMLU replaced by MMLU-Pro).',ch:[2]},
  {t:'Braintrust',d:'A hosted evaluation platform focused on experiment tracking, A/B testing of prompts, dataset management, and production logging. Offers a generous free tier of 50K logs/month.',ch:[8]},
  {t:'Canary Query',d:'A fixed test input with a known-good output that is run continuously against production. Like a canary in a coal mine — if the response changes, something in the system has changed.',ch:[11]},
  {t:'Chatbot Arena',d:'LMSYS Chatbot Arena — the most influential human evaluation system in AI. Users compare anonymous model responses side-by-side, and preferences are aggregated into ELO ratings.',ch:[6]},
  {t:'CI/CD Eval Gate',d:'An automated check in the deployment pipeline that runs the eval suite on every pull request and blocks merges if quality metrics drop below defined thresholds.',ch:[7]},
  {t:'Cohen\'s Kappa',d:'A statistical measure of inter-rater agreement that accounts for agreement by chance. Target >0.70 for binary decisions, >0.60 for multi-point scales. Low kappa indicates ambiguous guidelines, not bad annotators.',ch:[6]},
  {t:'Concept Drift',d:'When the real world changes and the system\'s knowledge becomes stale. Facts that were correct become wrong over time, degrading quality without any system changes.',ch:[11]},
  {t:'Context Precision',d:'A RAG evaluation metric that measures whether the retrieved documents are relevant to the query. High precision means the retrieval step is returning useful context.',ch:[4]},
  {t:'Context Recall',d:'A RAG evaluation metric that measures whether all relevant documents were retrieved. High recall means the system isn\'t missing important information.',ch:[4]},
  {t:'Data Drift',d:'When the distribution of user queries changes over time, causing the system to encounter inputs it wasn\'t designed for. Detected by tracking query embedding centroids.',ch:[11]},
  {t:'DeepEval',d:'An open-source LLM evaluation framework with 14+ metrics, pytest integration, conversational evaluation, custom metrics, and local benchmarking capabilities.',ch:[8]},
  {t:'Defense-in-Depth',d:'A security strategy using multiple independent layers of protection (input guardrails, model alignment, output guardrails, monitoring) so that no single failure compromises safety.',ch:[10]},
  {t:'Deterministic Metric',d:'An evaluation metric computed without LLM calls — format validation, length checks, regex patterns, exact match. Fast, free, and reproducible. Use wherever possible.',ch:[7]},
  {t:'ELO Rating',d:'A rating system (originally from chess) used to rank models based on pairwise comparison outcomes. Used by Chatbot Arena to create the most trusted model rankings.',ch:[6]},
  {t:'Eval Dataset',d:'A curated collection of inputs paired with expected behaviors — the definition of what "good" looks like for your specific use case. The single most important asset in an evaluation system.',ch:[7]},
  {t:'Eval-Driven Development (EDD)',d:'The AI equivalent of Test-Driven Development. Define the eval first, measure current performance, iterate until the eval passes, ship with confidence, and monitor in production.',ch:[7,12]},
  {t:'Faithfulness',d:'A RAG evaluation metric that measures whether the claims in the generated response are grounded in (supported by) the retrieved context. The most critical RAG quality metric.',ch:[4]},
  {t:'False Positive Rate',d:'In guardrails: the percentage of safe inputs/outputs incorrectly blocked. High false positive rates frustrate users and degrade UX. Target <1-5% depending on risk profile.',ch:[10]},
  {t:'Guardrail',d:'A programmatic safety mechanism that validates, filters, or sanitizes LLM inputs and outputs. Input guardrails protect the model; output guardrails protect the user.',ch:[10]},
  {t:'Guardrails AI',d:'An open-source library focused on structured output validation. Defines validators that check LLM outputs against schemas and supports automatic re-prompting when validation fails.',ch:[10]},
  {t:'Hallucination',d:'When an LLM generates information that is not grounded in its input context or factual reality. Includes fabricated facts, wrong attributions, invented citations, and contradictions.',ch:[4,9]},
  {t:'HumanEval',d:'A benchmark for evaluating code generation capabilities. Models are given function signatures and docstrings and must generate correct implementations that pass unit tests.',ch:[2]},
  {t:'Inter-Rater Agreement',d:'The degree to which different human annotators agree on their evaluations. Measured by Cohen\'s Kappa. Low agreement signals ambiguous guidelines, not bad annotators.',ch:[6]},
  {t:'Lakera Guard',d:'A real-time prompt injection detection API purpose-built for injection defense. Low latency (~50ms) and designed to be layered with other guardrails.',ch:[10]},
  {t:'LangSmith',d:'An end-to-end LLM engineering platform built by LangChain. Provides deep tracing, evaluation, monitoring, prompt management, and annotation queues.',ch:[8]},
  {t:'Langfuse',d:'An open-source LLM engineering platform with OpenTelemetry-compatible tracing, evaluation, prompt management, cost tracking, and full self-hosting capability.',ch:[8]},
  {t:'Likert Scale',d:'A rating scale (typically 1-5 or 1-7) used in absolute scoring for human evaluation. Requires careful calibration because different annotators interpret scales differently.',ch:[6]},
  {t:'LLM-as-Judge',d:'Using a strong LLM (like GPT-4o) to evaluate the outputs of another LLM. Achieves 80-90% agreement with human evaluators at 5000x lower cost.',ch:[3]},
  {t:'MMLU',d:'Massive Multitask Language Understanding — a benchmark testing knowledge across 57 academic subjects. Now largely saturated; replaced by MMLU-Pro with harder questions.',ch:[2]},
  {t:'Model Drift',d:'When an LLM provider silently updates the model, causing output style, accuracy, and behavior to shift without notice. Detected by scheduled eval runs and canary queries.',ch:[11]},
  {t:'NeMo Guardrails',d:'NVIDIA\'s open-source framework for adding programmable guardrails to LLM applications. Uses Colang DSL to define conversational rails for topic restriction, safety, and fact-checking.',ch:[10]},
  {t:'Observability',d:'The ability to understand a system\'s internal state from its external outputs. For LLMs, this means monitoring cost, latency, quality, safety, and hallucination rate in production.',ch:[9]},
  {t:'Pairwise Comparison',d:'An evaluation method where two responses are shown side-by-side and the evaluator picks which is better. The most reliable human evaluation method because humans are better at relative than absolute judgments.',ch:[6]},
  {t:'PII (Personally Identifiable Information)',d:'Data that can identify an individual — names, SSNs, emails, credit cards, addresses. Must be detected and handled in both LLM inputs and outputs, especially under GDPR, CCPA, and HIPAA.',ch:[10]},
  {t:'Presidio',d:'Microsoft\'s open-source PII detection and anonymization library. Supports 30+ PII types across multiple languages using regex patterns and NER models.',ch:[10]},
  {t:'Prompt Injection',d:'A security attack where a user crafts input that overrides the system prompt, making the model ignore its instructions. The #1 security threat to LLM applications.',ch:[10]},
  {t:'RAGAS',d:'Retrieval-Augmented Generation Assessment — the go-to open-source framework for evaluating RAG systems. Provides specialized metrics: faithfulness, answer relevancy, context precision, and context recall.',ch:[4,8]},
  {t:'Retrieval Drift',d:'When a RAG system\'s document corpus grows, ages, or develops contradictions, degrading retrieval quality over time without any code changes.',ch:[11]},
  {t:'RLHF',d:'Reinforcement Learning from Human Feedback — a training technique that uses human preference data to align models with human values. Human evaluation generates both test results and training signals.',ch:[6]},
  {t:'SWE-bench',d:'A benchmark that tests models on real-world software engineering tasks from GitHub issues. Models must generate code patches that pass existing test suites.',ch:[2]},
  {t:'Trace',d:'A complete record of what happened for a single LLM request — input, retrieval, model call (tokens, latency, cost), output, and post-processing. The foundation of LLM observability.',ch:[9]},
  {t:'TTFT (Time to First Token)',d:'The time between a user submitting a query and receiving the first token of the response. Critical for streaming UX — users perceive fast TTFT as fast overall response.',ch:[9]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar=document.getElementById('alpha-bar');
const body=document.getElementById('glossary-body');
const searchInput=document.getElementById('search-input');
const searchCount=document.getElementById('search-count');
const noResults=document.getElementById('no-results');
const totalCount=document.getElementById('total-count');

totalCount.textContent=`${TERMS.length} Terms`;

ALPHABET.forEach(letter=>{
  const btn=document.createElement('button');
  btn.className='alpha-btn';
  btn.textContent=letter;
  const hasTerms=TERMS.some(t=>t.t.toUpperCase().startsWith(letter));
  if(!hasTerms)btn.classList.add('disabled');
  btn.addEventListener('click',()=>{
    if(btn.classList.contains('disabled'))return;
    document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value='';
    buildGlossary(letter,true);
  });
  alphaBar.appendChild(btn);
});

const allBtn=document.createElement('button');
allBtn.className='alpha-btn active';
allBtn.style.width='auto';
allBtn.style.padding='0 10px';
allBtn.textContent='ALL';
allBtn.addEventListener('click',()=>{
  document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value='';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn,alphaBar.firstChild);

function makeRef(chNum){
  const a=document.createElement('a');
  a.className='term-ref';
  a.href=CHAPTERS[chNum]||'#';
  a.textContent=`Ch ${chNum}`;
  return a;
}

function buildGlossary(filter,isExactLetter=false){
  body.innerHTML='';
  const f=filter.toLowerCase();
  let filtered=TERMS;
  if(f){
    if(isExactLetter){
      filtered=TERMS.filter(t=>t.t.toLowerCase().startsWith(f));
    }else{
      filtered=TERMS.filter(t=>t.t.toLowerCase().includes(f)||t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));
    }
  }
  if(filtered.length===0){noResults.style.display='block';searchCount.textContent='0 matches';return;}
  noResults.style.display='none';
  if(f&&!isExactLetter){searchCount.textContent=`${filtered.length} match${filtered.length===1?'':'es'}`;}else{searchCount.textContent='';}
  let currentLetter='';let currentSection=null;
  filtered.forEach(term=>{
    const firstLetter=term.t.charAt(0).toUpperCase();
    if(firstLetter!==currentLetter){
      currentLetter=firstLetter;
      currentSection=document.createElement('div');
      currentSection.className='letter-section';
      const h=document.createElement('div');
      h.className='letter-head';
      h.textContent=currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row=document.createElement('div');row.className='term-row';
    const name=document.createElement('div');name.className='term-name';
    const bd=document.createElement('div');bd.className='term-body';
    const def=document.createElement('div');def.className='term-def';
    if(f&&!isExactLetter){
      const regex=new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
      def.innerHTML=term.d.replace(regex,'<strong>$1</strong>');
      name.innerHTML=term.t.replace(regex,'<strong>$1</strong>');
    }else{def.textContent=term.d;name.textContent=term.t;}
    const refs=document.createElement('div');refs.className='term-refs';
    term.ch.forEach(c=>refs.appendChild(makeRef(c)));
    bd.appendChild(def);bd.appendChild(refs);row.appendChild(name);row.appendChild(bd);currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce=null;
searchInput.addEventListener('input',()=>{clearTimeout(debounce);debounce=setTimeout(()=>buildGlossary(searchInput.value),150);});
</script>
</body>
