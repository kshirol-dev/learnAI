<div class="canvas">

    <div>
      <h1>MLOps &amp; LLMOps Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the MLOps &amp; LLMOps course.</div>

<script>
const CHAPTERS={
  1:'01-why-mlops-matters.html',
  2:'02-experiment-tracking.html',
  3:'03-model-registry-and-versioning.html',
  4:'04-data-pipelines-and-feature-stores.html',
  5:'05-cicd-for-machine-learning.html',
  6:'06-model-serving-and-inference.html',
  7:'07-llmops-gateways-and-routing.html',
  8:'08-llmops-prompt-management-and-evaluation.html',
  9:'09-monitoring-and-drift-detection.html',
  10:'10-the-mlops-stack.html'
};

const TERMS=[
  {t:'A/B Testing',d:'A deployment strategy that splits live traffic between two model or prompt versions to compare real-world performance. Measures business metrics (task completion, satisfaction) rather than just ML metrics.',ch:[5,8]},
  {t:'Artifact',d:'Any file produced by an ML pipeline step: trained model weights, evaluation reports, data snapshots, or configuration files. Stored in an artifact store (S3, GCS) and tracked by the experiment tracker.',ch:[2,3]},
  {t:'Blue-Green Deployment',d:'A deployment strategy that runs two identical production environments. Traffic is switched from the old (blue) to the new (green) version instantly, with easy rollback by switching back.',ch:[5]},
  {t:'Canary Deployment',d:'A deployment strategy that routes a small percentage of traffic (e.g., 5%) to the new model version while the majority stays on the current version. Gradually increases if metrics look good.',ch:[5]},
  {t:'CI/CD for ML',d:'Continuous Integration and Continuous Delivery adapted for machine learning. CI validates code and data; CD automates model deployment; CT (Continuous Training) retrains models on new data automatically.',ch:[5]},
  {t:'CML (Continuous Machine Learning)',d:'An open-source tool by Iterative (creators of DVC) that brings ML-specific CI/CD to GitHub Actions and GitLab CI. Generates model comparison reports as PR comments.',ch:[5]},
  {t:'Concept Drift',d:'A change in the relationship between input features and the target variable over time. The patterns the model learned during training become outdated. Harder to detect than data drift because it requires ground truth labels.',ch:[9]},
  {t:'Continuous Training (CT)',d:'The practice of automatically retraining models when triggered by data drift, schedule, or performance degradation. The third loop of ML CI/CD beyond CI and CD.',ch:[5,9]},
  {t:'Data Drift',d:'A change in the statistical distribution of input features in production compared to training data. Detected using statistical tests like Kolmogorov-Smirnov, Jensen-Shannon divergence, or Population Stability Index.',ch:[9]},
  {t:'Data Version Control (DVC)',d:'An open-source tool that brings Git-like versioning to datasets and ML pipelines. Tracks large files with content-addressable storage while keeping metadata in Git.',ch:[3]},
  {t:'Databricks Mosaic AI',d:'A unified platform for data engineering and ML built on the lakehouse architecture (Delta Lake). Created MLflow and provides Unity Catalog for governance across data and models.',ch:[10]},
  {t:'Dynamic Batching',d:'A serving optimization that groups incoming inference requests into batches to maximize GPU utilization. The server waits briefly for more requests before processing the batch together.',ch:[6]},
  {t:'Evidently AI',d:'The leading open-source tool for ML monitoring. Provides data drift reports, data quality checks, model performance tracking, and test suites that integrate into CI/CD pipelines.',ch:[9]},
  {t:'Experiment Tracking',d:'The practice of systematically recording parameters, metrics, code versions, and artifacts for every model training run. Enables reproducibility and comparison across experiments.',ch:[2]},
  {t:'Feature Store',d:'A centralized system for managing, sharing, and serving ML features. Provides both offline (batch) and online (low-latency) access to features, preventing training-serving skew.',ch:[4]},
  {t:'Feast',d:'An open-source feature store that provides offline feature retrieval (for training) and online feature serving (for inference). Supports multiple data sources and integrates with major ML platforms.',ch:[4,10]},
  {t:'Great Expectations',d:'An open-source data quality framework that validates data against declarative expectations (e.g., "column age should be between 0 and 120"). Catches schema changes and distribution shifts.',ch:[4]},
  {t:'Guardrails',d:'Automated checks that validate LLM inputs and outputs. Input guardrails detect prompt injection and PII; output guardrails check for hallucination, toxicity, and format compliance.',ch:[8]},
  {t:'Jensen-Shannon Divergence',d:'A symmetric statistical measure of the distance between two probability distributions. Used for data drift detection on larger datasets (>1,000 samples).',ch:[9]},
  {t:'Kolmogorov-Smirnov (KS) Test',d:'A non-parametric statistical test that compares two cumulative distribution functions. Used for data drift detection on numerical features with smaller datasets (≤1,000 samples).',ch:[9]},
  {t:'Kubeflow Pipelines',d:'An ML workflow orchestration platform built on Kubernetes. Provides ML-native pipeline authoring, per-step artifact tracking, GPU scheduling, and caching of pipeline steps.',ch:[10]},
  {t:'LakeFS',d:'An open-source tool that provides Git-like branching and versioning for data lakes. Enables atomic commits, branches, and merges on data stored in S3 or GCS.',ch:[3]},
  {t:'Langfuse',d:'An open-source LLM observability platform. Provides tracing for multi-step LLM applications, prompt management with versioning, A/B testing, and user feedback collection.',ch:[8]},
  {t:'LiteLLM',d:'An open-source (MIT) LLM gateway that provides a unified OpenAI-compatible API for 100+ LLM providers. Supports fallbacks, load balancing, budget management, and virtual API keys.',ch:[7]},
  {t:'LLM Gateway',d:'A unified proxy between applications and LLM providers. Provides routing, fallbacks, rate limiting, caching, cost tracking, and observability through a single API.',ch:[7]},
  {t:'LLM-as-Judge',d:'Using a powerful LLM (e.g., GPT-4o) to evaluate the quality of outputs from another LLM. Provides scores on correctness, helpfulness, and safety with ~75-85% agreement with human evaluators.',ch:[8]},
  {t:'LLMOps',d:'The extension of MLOps practices to Large Language Model applications. Adds concerns like prompt management, LLM gateways, per-token cost tracking, guardrails, and semantic caching.',ch:[7,8]},
  {t:'MLflow',d:'The most popular open-source platform for ML lifecycle management. Provides experiment tracking, model registry, model serving, and prompt registry. Created by Databricks.',ch:[2,3,10]},
  {t:'MLOps',d:'A set of practices that combines Machine Learning, DevOps, and Data Engineering to deploy and maintain ML models in production reliably and efficiently. Addresses the "last mile" problem of ML.',ch:[1]},
  {t:'MLOps Maturity Model',d:'A framework describing organizational readiness: Level 0 (manual), Level 1 (ML pipeline automation), Level 2 (CI/CD pipeline automation). Most organizations start at Level 0.',ch:[1]},
  {t:'Model Card',d:'A documentation artifact that describes a model\'s intended use, training data, performance metrics, limitations, and ethical considerations. Required for responsible AI deployment.',ch:[3]},
  {t:'Model Registry',d:'A centralized store for versioned models with metadata, stage labels (staging, production, archived), and lineage tracking. The single source of truth for which model is deployed where.',ch:[3]},
  {t:'Model Serving',d:'The infrastructure for running trained models and returning predictions. Includes real-time serving (REST/gRPC endpoints), batch prediction, and streaming inference.',ch:[6]},
  {t:'ONNX Runtime',d:'A cross-platform inference engine that runs models exported in the Open Neural Network Exchange format. Provides hardware-agnostic optimization and runs on CPU, GPU, and edge devices.',ch:[6]},
  {t:'PagedAttention',d:'A memory management technique used by vLLM that manages the KV cache in non-contiguous memory pages, similar to virtual memory in operating systems. Reduces memory waste by 60-80%.',ch:[6]},
  {t:'Population Stability Index (PSI)',d:'A metric for measuring data drift by comparing binned distributions. PSI < 0.1 indicates no significant drift; 0.1-0.2 indicates moderate drift; > 0.2 indicates significant drift.',ch:[9]},
  {t:'Portkey',d:'A managed LLM gateway with enterprise features including semantic caching (40% cost reduction), guardrails, detailed analytics, and conditional routing. SaaS-first with self-hosted option.',ch:[7]},
  {t:'Prompt Injection',d:'An attack where a user crafts input to override the system prompt and make the LLM behave in unintended ways. Detected and blocked by input guardrails.',ch:[8]},
  {t:'Prompt Registry',d:'A centralized store for versioned prompts, decoupled from application code. Enables instant prompt updates via aliases (production, staging) without code deploys.',ch:[8]},
  {t:'SageMaker',d:'Amazon\'s end-to-end ML platform covering data labeling, training, model registry, deployment, and monitoring. The most comprehensive managed ML platform with deep AWS integration.',ch:[10]},
  {t:'Semantic Caching',d:'A caching strategy that recognizes semantically similar queries (paraphrases) and returns cached responses. Uses embedding similarity rather than exact string matching.',ch:[7]},
  {t:'Shadow Deployment',d:'A deployment strategy where the new model receives a copy of production traffic but its predictions are not served to users. Used to compare new model behavior against the current model without risk.',ch:[5]},
  {t:'Technical Debt (ML)',d:'The accumulated cost of shortcuts in ML systems. Google\'s 2015 paper identified that only a small fraction of real-world ML systems is ML code; the rest is infrastructure that accumulates debt.',ch:[1]},
  {t:'Training-Serving Skew',d:'A discrepancy between how features are computed during training vs. inference. One of the most common and hardest-to-debug production ML failures. Feature stores prevent this.',ch:[4]},
  {t:'Triton Inference Server',d:'NVIDIA\'s open-source inference serving platform. Supports multiple frameworks (PyTorch, TensorFlow, ONNX), dynamic batching, model ensembles, and GPU-accelerated inference.',ch:[6]},
  {t:'Vertex AI',d:'Google Cloud\'s ML platform with BigQuery integration, AutoML, Model Garden (one-click deployment of open models), and Vertex AI Pipelines (based on Kubeflow).',ch:[10]},
  {t:'vLLM',d:'A high-throughput LLM serving engine that uses PagedAttention and continuous batching. Provides 2-4x throughput improvement over naive serving for large language models.',ch:[6]},
  {t:'Wasserstein Distance',d:'A statistical metric (also called Earth Mover\'s Distance) that measures the distance between two probability distributions. Sensitive to shape changes and used for data drift detection.',ch:[9]},
  {t:'Weights & Biases (W&B)',d:'A managed experiment tracking platform with real-time dashboards, hyperparameter sweep support, and team collaboration features. Excels at visualization and collaborative workflows.',ch:[2]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
