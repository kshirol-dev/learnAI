<script>
const CHAPTERS={
  1:'01-multimodal-revolution.html',2:'02-how-machines-see.html',3:'03-generative-family-tree.html',
  4:'04-contrastive-learning.html',5:'05-diffusion-models.html',6:'06-text-to-image.html',
  7:'07-text-to-video.html',8:'08-speech-audio-ai.html',9:'09-vision-language-models.html',
  10:'10-multimodal-landscape.html',11:'11-multimodal-embeddings.html',12:'12-training-multimodal.html',
  13:'13-building-applications.html',14:'14-multimodal-agents.html',15:'15-ethics-deepfakes.html',
  16:'16-evaluation.html',17:'17-future.html'
};

const TERMS=[
  {t:'Autoregressive Model',d:'A model that generates output one token at a time, where each new token is conditioned on all previously generated tokens. GPT and LLaVA use autoregressive generation.',ch:[3,9]},
  {t:'C2PA (Coalition for Content Provenance and Authenticity)',d:'A technical standard for embedding cryptographic provenance metadata into media files, enabling verification of origin and edit history. Key tool for combating deepfakes.',ch:[15]},
  {t:'CFG (Classifier-Free Guidance)',d:'A technique used during diffusion model inference that amplifies the influence of the text prompt on the generated image. Higher CFG values produce images more closely matching the prompt but with less diversity.',ch:[5,6]},
  {t:'CLAP (Contrastive Language-Audio Pretraining)',d:'The audio equivalent of CLIP — a model trained to align audio and text in a shared embedding space, enabling text-based audio search and classification.',ch:[8]},
  {t:'CLIP (Contrastive Language-Image Pretraining)',d:'A model by OpenAI trained on 400M image-text pairs to create a shared embedding space where images and text can be directly compared. Foundation for text-to-image generation and zero-shot classification.',ch:[4]},
  {t:'CNN (Convolutional Neural Network)',d:'A neural network architecture that uses learnable filters to detect visual features (edges, textures, objects) in images. Dominated computer vision before Vision Transformers.',ch:[2]},
  {t:'Contrastive Learning',d:'A training approach that learns representations by pulling similar pairs (positive) together and pushing dissimilar pairs (negative) apart in embedding space. The foundation of CLIP.',ch:[4]},
  {t:'ControlNet',d:'An architecture that adds spatial conditioning (edge maps, depth maps, pose) to diffusion models, giving users precise control over the composition and structure of generated images.',ch:[6]},
  {t:'DALL-E',d:'OpenAI\'s text-to-image model series. DALL-E 3 uses a two-stage pipeline: first generating a detailed caption, then generating the image from that caption.',ch:[6]},
  {t:'Deepfake',d:'AI-generated or AI-manipulated media (video, audio, images) designed to convincingly depict events that never occurred. Poses risks for misinformation, fraud, and non-consensual content.',ch:[15]},
  {t:'Diffusion Model',d:'A generative model that learns to create data by reversing a gradual noising process. During training, noise is added to data; during inference, the model removes noise step by step to generate new content.',ch:[5]},
  {t:'DiT (Diffusion Transformer)',d:'A diffusion model architecture that replaces the traditional U-Net backbone with a transformer. Used by Sora and newer image generators for better scaling and quality.',ch:[7]},
  {t:'ElevenLabs',d:'A leading AI voice synthesis company offering high-quality text-to-speech with voice cloning, multilingual support, and real-time streaming capabilities.',ch:[8]},
  {t:'Embedding Space',d:'A high-dimensional vector space where similar concepts are positioned close together. Multimodal embedding spaces align different modalities (text, image, audio) in the same space.',ch:[4,11]},
  {t:'GAN (Generative Adversarial Network)',d:'A generative model consisting of a generator and discriminator that compete against each other. Produced the first photorealistic AI images but is largely superseded by diffusion models.',ch:[3]},
  {t:'Image Patching',d:'The process of dividing an image into fixed-size patches (typically 14×14 or 16×16 pixels) that are then treated as tokens for a Vision Transformer. A 1024×1024 image becomes ~4,096 patches.',ch:[2]},
  {t:'Inpainting',d:'The ability to selectively edit regions of an image using AI while preserving the rest. The user masks an area and provides a text prompt describing what should appear there.',ch:[6]},
  {t:'LAION-5B',d:'A dataset of 5.85 billion image-text pairs scraped from the web, used to train CLIP and Stable Diffusion. Demonstrates the scale of data required for multimodal pretraining.',ch:[4]},
  {t:'Latent Diffusion',d:'A technique that performs the diffusion process in a compressed latent space rather than pixel space, reducing computational cost by 4-16x while maintaining quality. Used by Stable Diffusion.',ch:[5]},
  {t:'LLaVA (Large Language and Vision Assistant)',d:'An open-source vision-language model that connects a CLIP vision encoder to a language model through a projection layer. Demonstrates that strong VLMs can be built with modest compute.',ch:[9]},
  {t:'LoRA (Low-Rank Adaptation)',d:'A parameter-efficient fine-tuning technique that adds small trainable matrices to frozen model weights. Enables domain-specific customization of large models with minimal compute.',ch:[6,12]},
  {t:'Midjourney',d:'A commercial text-to-image service known for artistic, stylized outputs. Operates through Discord and is widely used by creative professionals.',ch:[6]},
  {t:'Multimodal RAG',d:'Retrieval-Augmented Generation that works across modalities — retrieving images, audio, or video alongside text documents to provide richer context for generation.',ch:[11]},
  {t:'QLoRA',d:'Quantized LoRA — combines 4-bit quantization with LoRA fine-tuning, enabling fine-tuning of large models on consumer GPUs with minimal quality loss.',ch:[12]},
  {t:'RLHF (Reinforcement Learning from Human Feedback)',d:'A training technique that uses human preference data to align model outputs with human values. Applied to multimodal models to reduce hallucination and improve safety.',ch:[12]},
  {t:'Sora',d:'OpenAI\'s text-to-video model that generates up to 60-second videos from text prompts. Uses a Diffusion Transformer (DiT) architecture with spacetime patches.',ch:[7]},
  {t:'Spacetime Patches',d:'An extension of image patching to video, where 3D patches span both spatial dimensions and time. Used by Sora to process video as a sequence of tokens.',ch:[7]},
  {t:'Stable Diffusion',d:'An open-source latent diffusion model for text-to-image generation. Uses CLIP for text encoding, a U-Net for denoising, and a VAE for encoding/decoding between pixel and latent space.',ch:[5,6]},
  {t:'Temporal Coherence',d:'The consistency of visual elements across video frames — objects maintain their appearance, physics are respected, and motion is smooth. The primary challenge in text-to-video generation.',ch:[7]},
  {t:'U-Net',d:'An encoder-decoder neural network architecture with skip connections, originally designed for image segmentation. Used as the denoising backbone in many diffusion models.',ch:[5]},
  {t:'VAE (Variational Autoencoder)',d:'A generative model that learns to encode data into a structured latent space and decode it back. Used in Stable Diffusion to compress images before the diffusion process.',ch:[3,5]},
  {t:'Vision Transformer (ViT)',d:'A transformer architecture adapted for images by treating image patches as tokens. Matches or exceeds CNN performance and is the foundation of modern vision-language models.',ch:[2]},
  {t:'VLA (Vision-Language-Action Model)',d:'A model that takes visual input and language instructions to produce physical actions, enabling robots to understand and execute natural language commands in the real world.',ch:[14]},
  {t:'VLM (Vision-Language Model)',d:'A model that can process both images and text, enabling tasks like visual question answering, image captioning, and visual reasoning. Examples: GPT-4V, Claude, Gemini, LLaVA.',ch:[9,10]},
  {t:'Whisper',d:'OpenAI\'s speech recognition model trained on 680,000 hours of multilingual audio. Supports transcription, translation, and language detection across 99 languages.',ch:[8]},
  {t:'Zero-Shot Classification',d:'The ability to classify inputs into categories the model was never explicitly trained on, by leveraging learned semantic relationships. CLIP enables zero-shot image classification via text descriptions.',ch:[4]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));
const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar=document.getElementById('alpha-bar');
const body=document.getElementById('glossary-body');
const searchInput=document.getElementById('search-input');
const searchCount=document.getElementById('search-count');
const noResults=document.getElementById('no-results');
const totalCount=document.getElementById('total-count');
totalCount.textContent=`${TERMS.length} Terms`;

ALPHABET.forEach(letter=>{const btn=document.createElement('button');btn.className='alpha-btn';btn.textContent=letter;const hasTerms=TERMS.some(t=>t.t.toUpperCase().startsWith(letter));if(!hasTerms)btn.classList.add('disabled');btn.addEventListener('click',()=>{if(btn.classList.contains('disabled'))return;document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');searchInput.value='';buildGlossary(letter,true);});alphaBar.appendChild(btn);});
const allBtn=document.createElement('button');allBtn.className='alpha-btn active';allBtn.style.width='auto';allBtn.style.padding='0 10px';allBtn.textContent='ALL';allBtn.addEventListener('click',()=>{document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));allBtn.classList.add('active');searchInput.value='';buildGlossary('');});alphaBar.insertBefore(allBtn,alphaBar.firstChild);

function makeRef(chNum){const a=document.createElement('a');a.className='term-ref';a.href=CHAPTERS[chNum]||'#';a.textContent=`Ch ${chNum}`;return a;}
function buildGlossary(filter,isExactLetter=false){body.innerHTML='';const f=filter.toLowerCase();let filtered=TERMS;if(f){if(isExactLetter){filtered=TERMS.filter(t=>t.t.toLowerCase().startsWith(f));}else{filtered=TERMS.filter(t=>t.t.toLowerCase().includes(f)||t.d.toLowerCase().includes(f));document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));}}if(filtered.length===0){noResults.style.display='block';searchCount.textContent='0 matches';return;}noResults.style.display='none';if(f&&!isExactLetter){searchCount.textContent=`${filtered.length} match${filtered.length===1?'':'es'}`;}else{searchCount.textContent='';}let currentLetter='';let currentSection=null;filtered.forEach(term=>{const firstLetter=term.t.charAt(0).toUpperCase();if(firstLetter!==currentLetter){currentLetter=firstLetter;currentSection=document.createElement('div');currentSection.className='letter-section';const h=document.createElement('div');h.className='letter-head';h.textContent=currentLetter;currentSection.appendChild(h);body.appendChild(currentSection);}const row=document.createElement('div');row.className='term-row';const name=document.createElement('div');name.className='term-name';const bd=document.createElement('div');bd.className='term-body';const def=document.createElement('div');def.className='term-def';if(f&&!isExactLetter){const regex=new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');def.innerHTML=term.d.replace(regex,'<strong>$1</strong>');name.innerHTML=term.t.replace(regex,'<strong>$1</strong>');}else{def.textContent=term.d;name.textContent=term.t;}const refs=document.createElement('div');refs.className='term-refs';term.ch.forEach(c=>refs.appendChild(makeRef(c)));bd.appendChild(def);bd.appendChild(refs);row.appendChild(name);row.appendChild(bd);currentSection.appendChild(row);});}
buildGlossary('');
let debounce=null;searchInput.addEventListener('input',()=>{clearTimeout(debounce);debounce=setTimeout(()=>buildGlossary(searchInput.value),150);});
</script>
