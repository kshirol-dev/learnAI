const CHAPTERS={
  1:'01-what-is-ai-high-level.html',2:'02-history-of-ai-high-level.html',3:'03-how-machines-learn-high-level.html',4:'04-data-the-fuel-high-level.html',5:'05-supervised-learning-high-level.html',6:'06-unsupervised-learning-high-level.html',7:'07-ml-pipeline-high-level.html',8:'08-ml-business-cases-high-level.html',9:'09-neural-networks-high-level.html',10:'10-computer-vision-high-level.html',11:'11-nlp-evolution-high-level.html',12:'12-gpu-revolution-high-level.html',13:'13-the-transformer-high-level.html',14:'14-large-language-models-high-level.html',15:'15-fine-tuning-vs-foundation-high-level.html',16:'16-prompt-engineering-high-level.html',17:'17-multimodal-ai-high-level.html',18:'18-rag-and-grounding-high-level.html',19:'19-ai-agents-high-level.html',20:'20-multi-agent-systems-high-level.html',21:'21-ai-landscape-high-level.html',22:'22-ai-economics-high-level.html',23:'23-ai-strategy-high-level.html',24:'24-ai-talent-org-high-level.html',25:'25-ai-adoption-high-level.html',26:'26-ai-security-risk-high-level.html',27:'27-ethics-governance-high-level.html',28:'28-road-ahead-high-level.html'
};

const TERMS=[
{t:'A/B Testing',d:'A controlled experiment comparing two versions (A and B) to determine which performs better. In AI, used to validate whether a new model outperforms the existing one in production.',ch:[7]},
{t:'A2A (Agent-to-Agent)',d:'An emerging communication protocol that allows AI agents built by different vendors to discover, authenticate, and collaborate with each other across organizational boundaries.',ch:[20]},
{t:'Accuracy',d:'The percentage of correct predictions a model makes out of all predictions. A useful but sometimes misleading metric\u2014a model predicting "no fraud" 99% of the time is 99% accurate but useless if 1% of transactions are fraudulent.',ch:[3,5,7]},
{t:'Activation Function',d:'A mathematical function inside a neural network that determines whether a neuron should "fire" (pass its signal forward). Common types include ReLU and sigmoid. Think of it as a gate that decides what information moves to the next layer.',ch:[9]},
{t:'Adversarial Attack',d:'A technique that subtly manipulates input data to fool an AI model into making wrong predictions. A tiny, invisible change to an image can cause a model to misclassify it with high confidence.',ch:[26]},
{t:'AGI (Artificial General Intelligence)',d:'A hypothetical AI system that can perform any intellectual task a human can, transferring knowledge across domains. No AGI exists today\u2014all current AI is narrow (task-specific). Experts debate whether it\u2019s 3 years or 30 years away.',ch:[1,5,28]},
{t:'AI Agent',d:'An AI system that goes beyond answering questions to taking autonomous action\u2014reasoning about goals, planning steps, using tools, and adapting based on results. Unlike chatbots, agents persist across tasks and operate with minimal human direction.',ch:[19,20,28]},
{t:'AI Champion',d:'An employee who advocates for AI adoption among peers. Research shows peer influence is 3\u20135\u00d7 more effective than top-down mandates for driving sustained AI usage.',ch:[25]},
{t:'AI CoE (Center of Excellence)',d:'A centralized organizational unit that provides AI expertise, governance, best practices, and shared resources across the enterprise. Typically evolves from centralized to hub-and-spoke to federated as AI maturity grows.',ch:[24]},
{t:'AI Governance',d:'The framework of policies, processes, and oversight mechanisms that ensure AI systems are developed and deployed responsibly. Includes risk assessment, bias auditing, compliance monitoring, and accountability structures.',ch:[23,27]},
{t:'AI Strategy',d:'A formal plan that aligns AI investments with business objectives, defines use case priorities, establishes governance, and allocates resources. Organizations with a formal AI strategy succeed 80% of the time vs. 37% without one.',ch:[23]},
{t:'AI Winter',d:'A period of reduced funding, interest, and progress in AI research, typically caused by overpromise and underdelivery. Two major AI winters occurred in the 1970s and late 1980s.',ch:[2]},
{t:'Algorithm',d:'A step-by-step procedure for solving a problem or making a decision. In ML, algorithms are the mathematical recipes that learn patterns from data\u2014examples include decision trees, neural networks, and gradient boosting.',ch:[1,3]},
{t:'AlexNet',d:'A deep convolutional neural network that won the 2012 ImageNet competition, reducing image classification errors by 41%. Widely considered the breakthrough that launched the modern deep learning era.',ch:[2,9,10]},
{t:'AlphaFold',d:'Google DeepMind\u2019s AI system that predicted the 3D structure of virtually every known protein\u2014a problem that took biologists decades per protein. Earned Demis Hassabis a Nobel Prize in Chemistry (2024).',ch:[28]},
{t:'Anomaly Detection',d:'An unsupervised learning technique that identifies data points that deviate significantly from normal patterns. Widely used for fraud detection, cybersecurity, equipment failure prediction, and quality control.',ch:[6,8]},
{t:'Anthropic',d:'An AI safety company founded by former OpenAI researchers, creator of the Claude family of language models. Valued at approximately $380B. Known for emphasis on AI safety and constitutional AI training methods.',ch:[14,21]},
{t:'API (Application Programming Interface)',d:'A standardized way for software systems to communicate. In AI, APIs let applications send data to AI models and receive predictions or generated content back without managing the model infrastructure directly.',ch:[15,22]},
{t:'ASI (Artificial Superintelligence)',d:'A theoretical AI system that surpasses human intelligence across all domains. Purely speculative\u2014no credible timeline exists. The concept raises profound questions about control and alignment.',ch:[1]},
{t:'Association Rules',d:'An unsupervised learning technique that discovers relationships between items in large datasets. Powers recommendation engines ("customers who bought X also bought Y") and market basket analysis.',ch:[6]},
{t:'Attention Mechanism',d:'The core innovation of the Transformer architecture. Allows a model to weigh the importance of every element in an input relative to every other element, enabling it to focus on the most relevant information regardless of distance.',ch:[13]},
{t:'Backpropagation',d:'The algorithm that trains neural networks by calculating how much each connection contributed to the error, then adjusting weights backward through the network. The fundamental learning mechanism of deep learning.',ch:[9]},
{t:'BERT',d:'Bidirectional Encoder Representations from Transformers. A Transformer model trained to understand language by reading text in both directions simultaneously. Excels at comprehension tasks like search, classification, and question answering.',ch:[11,13]},
{t:'Bias (in AI)',d:'Systematic errors in AI predictions that unfairly favor or disadvantage particular groups. Can originate from training data, algorithm design, or deployment context. A major governance concern\u2014Amazon\u2019s hiring tool famously discriminated against women.',ch:[3,27]},
{t:'Bias-Variance Trade-off',d:'A fundamental ML concept: models with high bias oversimplify (underfit), while models with high variance memorize noise (overfit). The goal is finding the sweet spot that generalizes well to new data.',ch:[3,5]},
{t:'CAIO (Chief AI Officer)',d:'A C-suite executive responsible for an organization\u2019s AI strategy, governance, and implementation. An increasingly common role as AI becomes central to business operations.',ch:[24,27]},
{t:'Chain-of-Thought (CoT)',d:'A prompting technique that instructs an LLM to show its reasoning step by step before giving a final answer. Significantly improves accuracy on complex, multi-step problems by forcing the model to "think out loud."',ch:[16]},
{t:'ChatGPT',d:'OpenAI\u2019s conversational AI product, launched November 2022. Reached 100 million users in two months\u2014the fastest-growing consumer application in history. Brought LLMs into mainstream awareness.',ch:[2,14]},
{t:'Chunking',d:'The process of breaking large documents into smaller, semantically meaningful pieces for use in RAG systems. Chunk size and strategy significantly affect retrieval quality\u2014too large loses precision, too small loses context.',ch:[18]},
{t:'Classification',d:'A supervised learning task where the model assigns inputs to predefined categories. Examples: spam vs. not spam, fraudulent vs. legitimate, positive vs. negative sentiment. The most common type of enterprise ML.',ch:[5]},
{t:'Clustering',d:'An unsupervised learning technique that groups similar data points together without predefined labels. Used for customer segmentation, document organization, and pattern discovery.',ch:[6]},
{t:'CNN (Convolutional Neural Network)',d:'A neural network architecture designed for processing grid-like data, especially images. Uses filters that slide across the input to detect features like edges, textures, and shapes at increasing levels of abstraction.',ch:[9,10]},
{t:'Computer Vision',d:'The field of AI that enables machines to interpret and understand visual information from images and video. Applications include image classification, object detection, facial recognition, medical imaging, and autonomous vehicles.',ch:[10]},
{t:'Constitutional AI',d:'A training approach developed by Anthropic where an AI model is given a set of principles ("constitution") and learns to self-critique and revise its outputs to align with those principles, reducing the need for human feedback.',ch:[14]},
{t:'Context Engineering',d:'The emerging discipline of managing what information reaches an AI model and in what form. Goes beyond prompt engineering to include retrieval strategy, memory management, and information architecture.',ch:[16]},
{t:'Context Window',d:'The maximum amount of text (measured in tokens) an LLM can process in a single interaction. Ranges from 8K to 1M+ tokens. Advertised context length often exceeds effective context\u2014models lose accuracy in the middle of long inputs.',ch:[14]},
{t:'CUDA',d:'NVIDIA\u2019s parallel computing platform that allows developers to use GPUs for general-purpose computing, including AI training. Created a powerful ecosystem lock-in that competitors struggle to break.',ch:[12]},
{t:'Data Drift',d:'When the statistical properties of real-world data change over time, causing a deployed model\u2019s accuracy to degrade. Requires continuous monitoring and periodic retraining to maintain performance.',ch:[4,7]},
{t:'Data Flywheel',d:'A self-reinforcing cycle where more users generate more data, which improves models, which attracts more users. Companies like Google and Amazon have built powerful competitive moats through data flywheels.',ch:[4]},
{t:'Data Governance',d:'The policies, standards, and processes that ensure data is accurate, consistent, secure, and used appropriately across an organization. A prerequisite for successful AI\u2014you cannot govern AI without governing data first.',ch:[4,23]},
{t:'Data Poisoning',d:'An attack where adversaries deliberately corrupt training data to manipulate a model\u2019s behavior. Can cause models to learn incorrect patterns or create hidden backdoors that activate on specific triggers.',ch:[26]},
{t:'Decision Tree',d:'A supervised learning algorithm that makes predictions by following a tree-like series of yes/no questions. Highly interpretable\u2014you can trace exactly why a decision was made. Often used in regulated industries.',ch:[5]},
{t:'Deep Learning',d:'A subset of machine learning that uses neural networks with many layers (hence "deep") to learn complex patterns. Enabled breakthroughs in vision, language, and generation that were impossible with classical ML.',ch:[9]},
{t:'Deepfake',d:'AI-generated synthetic media (images, audio, video) designed to convincingly impersonate real people. 59% of organizations have experienced deepfake attacks. A growing threat to information integrity and security.',ch:[17,26]},
{t:'DeepSeek',d:'A Chinese AI lab that demonstrated competitive model performance at dramatically lower training costs, challenging the assumption that only massive budgets can produce frontier models.',ch:[14,21]},
{t:'Dimensionality Reduction',d:'An unsupervised learning technique that simplifies high-dimensional data while preserving its essential structure. Makes complex datasets easier to visualize, analyze, and process.',ch:[6]},
{t:'Distillation (Knowledge)',d:'A technique where a large, expensive "teacher" model trains a smaller, cheaper "student" model to approximate its outputs. Can reduce inference costs by up to 25\u00d7 while retaining most of the teacher\u2019s capability.',ch:[15,22]},
{t:'Dynamic Pricing',d:'Using ML to adjust prices in real time based on demand, competition, inventory, and customer behavior. Airlines, ride-sharing, and e-commerce use it extensively.',ch:[8]},
{t:'Embedding',d:'A numerical representation of data (text, images, etc.) in a high-dimensional space where similar items are positioned close together. The foundation of semantic search, recommendations, and RAG systems.',ch:[11,18]},
{t:'Encoder-Decoder',d:'A neural network architecture with two parts: an encoder that compresses input into a representation, and a decoder that generates output from that representation. The original Transformer used both; BERT uses only the encoder, GPT only the decoder.',ch:[13]},
{t:'Ensemble Methods',d:'Techniques that combine multiple models to produce better predictions than any single model. Random Forest and XGBoost are popular examples. Often the winning approach in enterprise ML competitions.',ch:[5]},
{t:'EU AI Act',d:'The European Union\u2019s comprehensive AI regulation, the world\u2019s first major AI law. Classifies AI systems into four risk tiers with escalating requirements. Penalties up to \u20ac35M or 7% of global turnover. High-risk rules enforceable August 2026.',ch:[26,27]},
{t:'Feature Engineering',d:'The process of selecting, transforming, and creating input variables (features) that help ML models learn better. Often the most impactful step in classical ML\u2014good features matter more than complex algorithms.',ch:[5,7]},
{t:'Few-Shot Learning',d:'A prompting technique where you provide a small number of examples in the prompt to show the model the pattern you want. More effective than zero-shot for complex or domain-specific tasks.',ch:[16]},
{t:'Fine-Tuning',d:'Adapting a pre-trained model to a specific task or domain by training it further on specialized data. Ranges from lightweight (LoRA, $500\u2013$2K) to full enterprise fine-tuning ($12K\u2013$180K).',ch:[14,15]},
{t:'Foundation Model',d:'A large AI model trained on broad data that can be adapted to many downstream tasks. GPT-4, Claude, Gemini, and LLaMA are foundation models. The economics: train once at enormous cost, deploy millions of times.',ch:[13,14,21]},
{t:'GAN (Generative Adversarial Network)',d:'A neural network architecture where two networks compete: a generator creates fake data and a discriminator tries to detect it. This adversarial training produces increasingly realistic synthetic content.',ch:[9,17]},
{t:'Gemini',d:'Google\u2019s family of multimodal AI models, designed to process text, images, audio, and video natively. Competes with GPT-4 and Claude at the frontier of AI capability.',ch:[14,17,21]},
{t:'GPT (Generative Pre-trained Transformer)',d:'OpenAI\u2019s family of language models that generate text by predicting the next token. GPT-4 (~1.8 trillion parameters) is the flagship. "Pre-trained" means it learns general language before being fine-tuned for specific tasks.',ch:[11,13,14]},
{t:'GPU (Graphics Processing Unit)',d:'A processor originally designed for rendering graphics, now the primary hardware for AI training and inference. GPUs can perform thousands of calculations simultaneously, making them ideal for the parallel math that neural networks require.',ch:[12]},
{t:'Gradient Boosting',d:'An ensemble method that builds models sequentially, with each new model correcting the errors of the previous one. XGBoost and LightGBM are popular implementations that dominate tabular data competitions.',ch:[5]},
{t:'GraphRAG',d:'An advanced RAG technique that builds a knowledge graph from documents, capturing relationships between entities. Enables multi-hop reasoning ("Who reports to the person who approved this budget?") that standard RAG cannot handle.',ch:[18]},
{t:'Guardrails',d:'Safety mechanisms that constrain AI system behavior within acceptable boundaries. Include input validation, output filtering, rate limiting, human-in-the-loop checkpoints, and kill switches.',ch:[19,27]},
{t:'Hallucination',d:'When an AI model generates information that sounds plausible but is factually incorrect or fabricated. The best models still hallucinate approximately 3% of the time. The "Reasoning Paradox": models that reason better hallucinate more confidently.',ch:[14,18]},
{t:'HITL (Human-in-the-Loop)',d:'A system design where humans review and approve AI decisions before they are executed. Essential for high-risk applications. Evolves to HOTL (human-on-the-loop, monitoring) as trust increases.',ch:[23,27]},
{t:'Humanoid Robot',d:'A robot designed in human form to operate in environments built for humans. Companies like Figure, Tesla (Optimus), and Agility Robotics are building general-purpose humanoids for warehouse, manufacturing, and hazardous work.',ch:[28]},
{t:'Hyperparameter',d:'A configuration setting chosen before training begins (learning rate, number of layers, batch size) that controls how the model learns. Tuning hyperparameters is part art, part science, and significantly affects model performance.',ch:[7]},
{t:'ImageNet',d:'A massive dataset of 14+ million labeled images used as a benchmark for computer vision. The annual ImageNet competition (2010\u20132017) drove rapid advances in deep learning, including AlexNet\u2019s breakthrough.',ch:[2,10]},
{t:'Inference',d:'The process of using a trained model to make predictions on new data. If training is like studying for an exam, inference is taking the exam. Inference costs are per-use and ongoing\u2014often the dominant cost in production AI.',ch:[3,12,22]},
{t:'Inference-Time Compute',d:'A paradigm where AI models "think longer" on difficult problems by using more computation at inference time rather than relying solely on a larger pre-trained model. OpenAI\u2019s o-series models pioneered this approach.',ch:[14,28]},
{t:'ISO/IEC 42001',d:'The international standard for AI management systems, providing a framework for organizations to establish, implement, and improve responsible AI practices. Increasingly required for enterprise AI certification.',ch:[27]},
{t:'Kill Switch',d:'An emergency mechanism to immediately halt an AI system\u2019s operation. Best practice requires activation within 60 seconds. Essential for autonomous AI systems where errors can cascade rapidly.',ch:[27]},
{t:'LangGraph',d:'A framework for building stateful, multi-agent AI applications as directed graphs. Agents are nodes, communication channels are edges. One of the leading frameworks for production multi-agent systems.',ch:[20]},
{t:'Large Language Model (LLM)',d:'A neural network with billions of parameters trained on massive text datasets to understand and generate human language. Built on the Transformer architecture. Examples: GPT-4, Claude, Gemini, LLaMA.',ch:[14]},
{t:'LLaMA',d:'Meta\u2019s family of open-weight large language models. Released freely for research and commercial use, LLaMA models have become the foundation of the open-source AI ecosystem.',ch:[14,21]},
{t:'LoRA (Low-Rank Adaptation)',d:'A parameter-efficient fine-tuning technique that trains only a small number of additional parameters instead of modifying the entire model. Dramatically reduces fine-tuning cost ($500\u2013$2K vs. millions for full training).',ch:[15]},
{t:'LSTM (Long Short-Term Memory)',d:'A type of recurrent neural network designed to remember information over long sequences. Dominated NLP before Transformers. Still used in some time-series and sequential data applications.',ch:[9,11]},
{t:'Machine Learning (ML)',d:'A subset of AI where systems learn patterns from data rather than following explicitly programmed rules. The fundamental inversion: instead of writing rules, you provide examples and the algorithm discovers the rules.',ch:[1,3]},
{t:'MCP (Model Context Protocol)',d:'An emerging standard that provides AI agents with a universal way to access external tools, databases, and APIs. Think of it as a USB-C port for AI\u2014one standard interface for connecting to any data source.',ch:[20]},
{t:'MLOps',d:'The discipline of deploying, monitoring, and maintaining ML models in production. Combines ML with DevOps practices. Addresses the reality that building a model is 10% of the work\u2014the other 90% is operationalizing it.',ch:[7]},
{t:'Model',d:'The mathematical representation that an ML algorithm produces after training on data. Contains learned patterns (weights and parameters) that enable predictions on new inputs. Ranges from simple (decision tree) to massive (GPT-4, 1.8T parameters).',ch:[3]},
{t:'Model Card',d:'A standardized document that describes a model\u2019s intended use, performance characteristics, limitations, training data, and ethical considerations. A key governance artifact for transparency and accountability.',ch:[27]},
{t:'Multi-Agent System',d:'An architecture where multiple specialized AI agents collaborate to accomplish complex tasks that would overwhelm a single agent. Agents divide work, communicate results, and coordinate through defined patterns.',ch:[20]},
{t:'Multi-Head Attention',d:'A Transformer mechanism that runs multiple attention operations in parallel, each focusing on different types of relationships in the data. Like having multiple analysts examine the same document for different insights simultaneously.',ch:[13]},
{t:'Multimodal AI',d:'AI systems that can process and generate multiple types of data\u2014text, images, audio, video\u2014within a single model. GPT-4o and Gemini are leading multimodal models.',ch:[17]},
{t:'Narrow AI',d:'AI that excels at a specific task but cannot transfer its knowledge to other domains. All commercial AI today is narrow. A chess AI cannot play Go; a translation model cannot diagnose diseases.',ch:[1]},
{t:'Natural Language Processing (NLP)',d:'The field of AI focused on enabling machines to understand, interpret, and generate human language. Evolved through five eras from rigid rules to modern Transformer-based models.',ch:[11]},
{t:'Neural Network',d:'A computing system inspired by biological neurons, consisting of layers of interconnected nodes that process information. Each connection has a weight that is adjusted during training. The foundation of deep learning.',ch:[9]},
{t:'NIST AI RMF',d:'The National Institute of Standards and Technology\u2019s AI Risk Management Framework. A voluntary US framework that has become the de facto negligence standard\u2014courts increasingly reference it when evaluating AI-related liability.',ch:[26,27]},
{t:'NVIDIA',d:'The dominant manufacturer of AI training and inference hardware, controlling 80\u201390% of the market. Revenue reached $112B in FY2025. Its CUDA platform creates powerful ecosystem lock-in.',ch:[12]},
{t:'Object Detection',d:'A computer vision task that identifies and locates multiple objects within an image, drawing bounding boxes around each. YOLO (You Only Look Once) is the most widely deployed real-time object detection model.',ch:[10]},
{t:'Open Source (AI)',d:'AI models whose weights and/or code are publicly available for anyone to use, modify, and deploy. Meta\u2019s LLaMA is the leading example. Open source enables customization and avoids vendor lock-in but requires more internal expertise.',ch:[21]},
{t:'OpenAI',d:'The AI company behind GPT-4 and ChatGPT. Founded in 2015, it has become the most valuable AI company (valued at ~$850B). Pioneered the commercial LLM market and RLHF training methodology.',ch:[14,21]},
{t:'Overfitting',d:'When a model memorizes training data instead of learning generalizable patterns. Performs excellently on training data but poorly on new data. Like a student who memorizes answers instead of understanding concepts.',ch:[3,5]},
{t:'Parameter',d:'A numerical value inside a model that is adjusted during training. GPT-4 has approximately 1.8 trillion parameters. More parameters generally enable more complex pattern recognition but increase cost and computational requirements.',ch:[9,14]},
{t:'PEFT (Parameter-Efficient Fine-Tuning)',d:'A family of techniques (including LoRA) that fine-tune only a small subset of a model\u2019s parameters. Reduces training cost and time by orders of magnitude while preserving most of the original model\u2019s capability.',ch:[15]},
{t:'Perceptron',d:'The simplest neural network\u2014a single artificial neuron that takes weighted inputs, sums them, and produces an output. Invented in 1958. Modern deep learning stacks millions of these in layers.',ch:[9]},
{t:'Predictive Maintenance',d:'Using ML to predict when equipment will fail before it actually does, enabling proactive repairs. Reduces unplanned downtime by 30\u201350% and maintenance costs by 20\u201340%.',ch:[8]},
{t:'Pre-Training',d:'The first stage of training a foundation model, where it learns general patterns from massive datasets (often the entire internet). Extremely expensive ($50\u2013100M+ for frontier models) but creates a versatile base for many downstream tasks.',ch:[13,14]},
{t:'Prompt Engineering',d:'The skill of crafting effective instructions for AI models to produce desired outputs. Good prompting delivers 89% task time savings; poor prompting loses 40% of potential value. Includes techniques like few-shot, CoT, and system prompts.',ch:[16]},
{t:'Prompt Injection',d:'An attack where malicious instructions are embedded in input to hijack an AI model\u2019s behavior. The #1 AI security threat (OWASP), with 50\u201384% success rates in research. Experts warn it "may never be fully patched."',ch:[19,26]},
{t:'Quantization',d:'A technique that reduces model size and inference cost by using lower-precision numbers (e.g., 8-bit instead of 32-bit). Can cut costs by 50\u201375% with minimal accuracy loss. A key optimization lever for production deployment.',ch:[22]},
{t:'RAG (Retrieval-Augmented Generation)',d:'A technique that gives AI models access to external knowledge by retrieving relevant documents before generating a response. Like giving a student an open book during an exam. Reduces hallucinations by 60\u201380%.',ch:[18]},
{t:'Random Forest',d:'An ensemble method that builds many decision trees on random subsets of data and averages their predictions. Robust, accurate, and relatively easy to interpret. A workhorse of enterprise ML.',ch:[5]},
{t:'ReAct (Reason + Act)',d:'A framework for AI agents that alternates between reasoning about what to do and taking action. The agent thinks, acts, observes the result, and adapts\u2014creating a loop of continuous improvement.',ch:[16,19]},
{t:'Regression',d:'A supervised learning task where the model predicts a continuous numerical value. Examples: forecasting revenue, estimating house prices, predicting customer lifetime value.',ch:[5]},
{t:'Reinforcement Learning',d:'A type of ML where an agent learns by taking actions in an environment and receiving rewards or penalties. Used to train game-playing AI (AlphaGo), robotics, and recommendation systems.',ch:[3]},
{t:'RLHF (Reinforcement Learning from Human Feedback)',d:'The third stage of LLM training where human evaluators rank model outputs and the model learns to prefer responses humans rate highly. The key technique that made ChatGPT helpful and aligned with human preferences.',ch:[14]},
{t:'RNN (Recurrent Neural Network)',d:'A neural network architecture designed for sequential data, where the output from one step feeds into the next. Dominated NLP before Transformers but struggled with long sequences due to vanishing gradients.',ch:[9,11]},
{t:'ROI (Return on Investment)',d:'The financial return generated relative to the cost of an AI investment. Successful AI implementations deliver 3.5\u00d7 ROI within 24 months. 56% of projects fail to deliver positive ROI without a formal strategy.',ch:[8,22,23]},
{t:'Scaling Laws',d:'Empirical observations that model performance improves predictably as you increase model size, training data, and compute. Drove the race to build ever-larger models. Now complemented by inference-time compute scaling.',ch:[14]},
{t:'Self-Supervised Learning',d:'A training approach where the model creates its own labels from the data\u2014for example, predicting masked words in a sentence. The method behind BERT and GPT pre-training. Enables learning from vast unlabeled datasets.',ch:[3,13]},
{t:'Semantic Search',d:'Search that understands the meaning of queries rather than just matching keywords. Powered by embeddings that represent text as numerical vectors. "Affordable sedan" finds results about "budget-friendly cars."',ch:[18]},
{t:'Sentiment Analysis',d:'An NLP task that determines the emotional tone of text\u2014positive, negative, or neutral. Used to monitor brand perception, analyze customer feedback, and gauge market sentiment.',ch:[11]},
{t:'SFT (Supervised Fine-Tuning)',d:'The second stage of LLM training where the model is fine-tuned on curated question-answer pairs to learn how to be a helpful assistant. Bridges the gap between raw language prediction and useful conversation.',ch:[14]},
{t:'Shadow AI',d:'The use of AI tools by employees without official IT approval or oversight. 73% of organizations have unsanctioned AI usage, growing 83% faster than sanctioned tools. Only 12% of IT teams have visibility into it.',ch:[25]},
{t:'Stargate',d:'A $500 billion infrastructure project by Microsoft, OpenAI, Oracle, and SoftBank to build massive AI data centers. Represents the scale of investment required for next-generation AI compute.',ch:[28]},
{t:'Supervised Learning',d:'A type of ML where the model learns from labeled examples\u2014input-output pairs where the correct answer is provided. The most common form of enterprise ML, used for classification and regression tasks.',ch:[3,5]},
{t:'System Prompt',d:'Hidden instructions given to an LLM that define its role, behavior, constraints, and output format before the user\u2019s message. The foundation of enterprise AI customization\u2014sets the "personality" and rules for every interaction.',ch:[16]},
{t:'Token',d:'The basic unit of text that LLMs process\u2014roughly 3/4 of a word in English. "Artificial intelligence" is typically 2\u20133 tokens. AI pricing, context windows, and generation limits are all measured in tokens.',ch:[14,22]},
{t:'Training',d:'The process of teaching an ML model by exposing it to data and adjusting its internal parameters to minimize prediction errors. Training is computationally expensive and done once (or periodically); the result is a model ready for inference.',ch:[3]},
{t:'Transfer Learning',d:'Using knowledge learned from one task to improve performance on a different but related task. The foundation of modern AI: pre-train a large model on general data, then fine-tune it for specific applications.',ch:[13,15]},
{t:'Transformer',d:'The neural network architecture introduced in the 2017 paper "Attention Is All You Need." Uses self-attention to process all elements of an input simultaneously. Powers virtually all modern AI: LLMs, image generators, speech models, and more.',ch:[13]},
{t:'Turing Test',d:'A test proposed by Alan Turing in 1950: if a machine can converse with a human and the human cannot reliably tell it\u2019s a machine, the machine exhibits intelligent behavior. Modern LLMs can pass simple versions of this test.',ch:[2]},
{t:'Underfitting',d:'When a model is too simple to capture the patterns in the data. Performs poorly on both training and new data. The opposite of overfitting\u2014like using a straight line to model a curve.',ch:[3]},
{t:'Unsupervised Learning',d:'A type of ML where the model finds patterns in data without labeled examples. Used for clustering, anomaly detection, dimensionality reduction, and association rules. Discovers structure humans might not see.',ch:[3,6]},
{t:'Vector Database',d:'A specialized database designed to store and efficiently search high-dimensional vectors (embeddings). Essential infrastructure for RAG systems, semantic search, and recommendation engines. Examples: Pinecone, Qdrant, pgvector.',ch:[18]},
{t:'Vera Rubin',d:'NVIDIA\u2019s next-generation AI computing platform, designed for the massive scale required by physical AI, world models, and frontier model training.',ch:[28]},
{t:'Word2Vec',d:'A pioneering technique (2013) that represents words as numerical vectors where semantic relationships are preserved. "King \u2013 Man + Woman = Queen." Laid the groundwork for modern embeddings and NLP.',ch:[11]},
{t:'World Model',d:'An AI system that builds an internal representation of how the physical world works, enabling it to simulate interactions and predict outcomes before acting. A key enabling technology for robotics and autonomous vehicles.',ch:[28]},
{t:'XGBoost',d:'An optimized gradient boosting algorithm that is fast, accurate, and handles missing data well. Dominates tabular data competitions and enterprise ML applications. Often the first algorithm data scientists try.',ch:[5]},
{t:'YOLO (You Only Look Once)',d:'A real-time object detection algorithm that processes an entire image in a single pass. Widely used in manufacturing quality control, autonomous vehicles, and security surveillance.',ch:[10]},
{t:'Zero-Shot Learning',d:'Asking an AI model to perform a task without providing any examples\u2014relying entirely on its pre-trained knowledge. Works well for common tasks but less reliably for specialized or domain-specific problems.',ch:[16]}
];

const body=document.getElementById('glossaryBody');
const searchInput=document.getElementById('searchInput');
const searchCount=document.getElementById('searchCount');
const totalCount=document.getElementById('totalCount');
const alphaBar=document.getElementById('alphaBar');
const noResults=document.getElementById('noResults');

totalCount.textContent=TERMS.length+' terms';

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const usedLetters=new Set(TERMS.map(t=>t.t[0].toUpperCase()));

letters.forEach(l=>{
  const btn=document.createElement('button');
  btn.className='alpha-btn'+(usedLetters.has(l)?'':' disabled');
  btn.textContent=l;
  btn.addEventListener('click',()=>{
    const sec=document.getElementById('letter-'+l);
    if(sec){sec.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.alpha-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
  });
  alphaBar.appendChild(btn);
});

function makeRef(ch){
  const a=document.createElement('a');
  a.className='term-ref';
  a.href=CHAPTERS[ch];
  a.textContent='Ch '+ch;
  return a;
}

function buildGlossary(filter){
  const existing=body.querySelectorAll('.letter-section');
  existing.forEach(e=>e.remove());

  const q=filter?filter.toLowerCase().trim():'';
  const filtered=q?TERMS.filter(t=>t.t.toLowerCase().includes(q)||t.d.toLowerCase().includes(q)):TERMS;

  searchCount.textContent=filtered.length+' of '+TERMS.length;
  noResults.style.display=filtered.length?'none':'block';

  let currentLetter='';
  let currentSection=null;

  filtered.forEach(term=>{
    const first=term.t[0].toUpperCase();
    if(first!==currentLetter){
      currentLetter=first;
      currentSection=document.createElement('div');
      currentSection.className='letter-section';
      currentSection.id='letter-'+first;
      const h=document.createElement('div');
      h.className='letter-head';
      h.textContent=first;
      currentSection.appendChild(h);
      body.insertBefore(currentSection,noResults);
    }

    const row=document.createElement('div');
    row.className='term-row';

    const name=document.createElement('div');
    name.className='term-name';
    name.textContent=term.t;

    const bd=document.createElement('div');
    bd.className='term-body';

    const def=document.createElement('div');
    def.className='term-def';
    def.textContent=term.d;

    const refs=document.createElement('div');
    refs.className='term-refs';
    term.ch.forEach(c=>refs.appendChild(makeRef(c)));

    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce=null;
searchInput.addEventListener('input',()=>{
  clearTimeout(debounce);
  debounce=setTimeout(()=>buildGlossary(searchInput.value),150);
});
</script>
