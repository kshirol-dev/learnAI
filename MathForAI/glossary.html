<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--amber-light) 0%,var(--orange-light) 40%,var(--violet-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--amber);padding:4px 12px;background:var(--amber-light);border:1px solid var(--amber-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}

.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--amber)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}

.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--amber-light);color:var(--amber)}.alpha-btn.active{background:var(--amber);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}

.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--amber);padding-bottom:8px;border-bottom:2px solid var(--amber-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}
.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--amber);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}

<footer style="text-align:center;padding:32px 20px 20px;font-size:13px;color:#8892ab;border-top:1px solid #dfe3ed;font-family:'Inter',system-ui,sans-serif;display:block;width:100%;box-sizing:border-box;clear:both;">

<script>
const CHAPTERS={
  1:'01-vectors-and-spaces.html',
  2:'02-matrices-and-transformations.html',
  3:'03-eigenvalues-svd-decompositions.html',
  4:'04-derivatives-and-gradients.html',
  5:'05-chain-rule-backpropagation.html',
  6:'06-optimization-gradient-descent.html',
  7:'07-probability-foundations.html',
  8:'08-distributions-expectations.html',
  9:'09-maximum-likelihood.html',
  10:'10-hypothesis-testing.html',
  11:'11-information-theory.html',
  12:'12-tensors-geometry.html',
  13:'13-numerical-methods.html',
  14:'14-math-of-modern-ai.html'
};

const TERMS=[
  {t:'Adam Optimizer',d:'Adaptive Moment Estimation. An advanced optimization algorithm that computes individual learning rates for different parameters by keeping track of both the average of past gradients (momentum) and the uncentered variance of past gradients.',ch:[6]},
  {t:'Backpropagation',d:'The algorithm used to calculate the gradient of the loss function with respect to the weights in a neural network. It applies the Chain Rule of calculus from the output layer backwards to the input layer.',ch:[5]},
  {t:'Bayes\' Theorem',d:'A fundamental theorem in probability that describes how to update the probability of a hypothesis based on new evidence. Mathematically: P(A|B) = [P(B|A) * P(A)] / P(B).',ch:[7]},
  {t:'Central Limit Theorem',d:'A statistical theory stating that given a sufficiently large sample size, the sampling distribution of the mean will be normally distributed (a bell curve), regardless of the original distribution of the data.',ch:[8]},
  {t:'Chain Rule',d:'A formula in calculus for computing the derivative of the composition of two or more functions. Essential for backpropagation in deep neural networks.',ch:[5]},
  {t:'Cross-Entropy',d:'A measure from information theory that calculates the difference between two probability distributions. Widely used as the loss function for classification problems and LLM training.',ch:[11]},
  {t:'Derivative',d:'A concept from calculus that measures the instantaneous rate of change of a function with respect to one of its variables. Geometrically, it is the slope of the tangent line to the curve.',ch:[4]},
  {t:'Dot Product',d:'An algebraic operation that takes two equal-length sequences of numbers (vectors) and returns a single number. Geometrically, it measures how much one vector points in the same direction as another.',ch:[1]},
  {t:'Eigenvalue / Eigenvector',d:'For a given matrix (transformation), an eigenvector is a vector whose direction does not change when the transformation is applied. The eigenvalue is the scalar by which the eigenvector is stretched or squashed.',ch:[3]},
  {t:'Entropy',d:'In information theory, a measure of the unpredictability or "surprise" of a random variable. A highly predictable event has low entropy; a completely random event has high entropy.',ch:[11]},
  {t:'Gradient',d:'A vector containing all the partial derivatives of a multivariable function. It points in the direction of the steepest ascent (maximum increase) of the function.',ch:[4]},
  {t:'Gradient Descent',d:'An optimization algorithm used to find a local minimum of a differentiable function. It takes repeated steps in the opposite direction of the gradient of the function at the current point.',ch:[6]},
  {t:'Learning Rate',d:'A hyperparameter that determines the step size at each iteration while moving toward a minimum of a loss function during optimization.',ch:[6]},
  {t:'Matrix',d:'A rectangular array of numbers arranged in rows and columns. In linear algebra, matrices are used to represent linear transformations (like rotations or scaling) applied to vectors.',ch:[2]},
  {t:'Maximum Likelihood Estimation (MLE)',d:'A method of estimating the parameters of a statistical model by maximizing the likelihood function, making the observed data most probable under the assumed statistical model.',ch:[9]},
  {t:'Normal Distribution',d:'Also known as the Gaussian distribution or bell curve. A continuous probability distribution that is symmetric about the mean, showing that data near the mean are more frequent in occurrence than data far from the mean.',ch:[8]},
  {t:'Partial Derivative',d:'The derivative of a multivariable function with respect to one variable, with all other variables held constant. Used to calculate gradients.',ch:[4]},
  {t:'Scalar',d:'A single number, representing magnitude without direction. A 0-dimensional tensor.',ch:[1,12]},
  {t:'Singular Value Decomposition (SVD)',d:'A factorization of a real or complex matrix into three matrices, revealing the underlying structure of the matrix. It is the mathematical foundation for techniques like PCA and LoRA.',ch:[3]},
  {t:'Tensor',d:'A mathematical object that generalizes scalars, vectors, and matrices to higher dimensions. A scalar is a 0D tensor, a vector is 1D, a matrix is 2D, and an RGB image is a 3D tensor.',ch:[12]},
  {t:'Underflow / Overflow',d:'Numerical stability issues in computing. Underflow occurs when a number is too small to be represented and rounds to zero. Overflow occurs when a number is too large to be represented.',ch:[13]},
  {t:'Vector',d:'An array of numbers that represents a point or a direction in space. In machine learning, vectors are used to represent features, embeddings, and weights. A 1-dimensional tensor.',ch:[1]}
];

// Sort terms alphabetically
TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

// Build Alphabet Bar
ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }

  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }

  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }

  let currentLetter = '';
  let currentSection = null;

  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }

    const row = document.createElement('div');
    row.className = 'term-row';

    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;

    const bd = document.createElement('div');
    bd.className = 'term-body';

    const def = document.createElement('div');
    def.className = 'term-def';
    
    // Highlight search term if applicable
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }

    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));

    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script></body>
</html>
