<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--violet-light) 0%,var(--blue-light) 40%,var(--teal-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--violet);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--violet);padding:4px 12px;background:var(--violet-light);border:1px solid var(--violet-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}

.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--violet)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}

.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--violet-light);color:var(--violet)}.alpha-btn.active{background:var(--violet);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}

.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--violet);padding-bottom:8px;border-bottom:2px solid var(--violet-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}
.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--violet-light);color:var(--violet);border:1px solid var(--violet-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--violet);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}

<body>
<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div>
      <h1>AI Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the How LLMs Work course.</div>
    </div>
    <div class="tb-count" id="total-count">0 Terms</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-link"><span class="material-symbols-rounded">arrow_back</span> Back to Course</a>
    <a href="../index.html" class="nav-link"><span class="material-symbols-rounded">home</span> Learning Portal</a>

  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'Attention', 'Token')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>

  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>

</div>

<script>
const CHAPTERS={
  1:'01-text-to-tokens.html',
  2:'02-embeddings.html',
  3:'03-attention.html',
  4:'04-transformer-block.html',
  5:'05-scaling-up.html',
  6:'06-training-recipe.html',
  7:'07-fine-tuning.html',
  8:'08-rlhf-alignment.html',
  9:'09-text-generation.html',
  10:'10-context-windows.html',
  11:'11-making-llms-fast.html',
  12:'12-multimodal-llms.html',
  13:'13-emergent-abilities.html',
  14:'14-llm-landscape.html'
};

const TERMS=[
  {t:'Attention Mechanism',d:'The core mathematical operation in a Transformer that allows each token to look at all other tokens in the sequence and determine which ones are most relevant to understanding its current context.',ch:[3]},
  {t:'Autoregressive',d:'A type of model that predicts the next value in a sequence based on the previous values. LLMs are autoregressive: they generate text one token at a time, feeding the new token back into the input for the next step.',ch:[9]},
  {t:'BPE (Byte-Pair Encoding)',d:'A common subword tokenization algorithm that starts with single characters and iteratively merges the most frequently occurring pairs into new, single tokens.',ch:[1]},
  {t:'Context Window',d:'The maximum number of tokens an LLM can process at one time. If a prompt exceeds this limit, the model will "forget" the earliest parts of the prompt.',ch:[10]},
  {t:'Embeddings',d:'High-dimensional vectors (arrays of numbers) that represent the semantic meaning of a token. Words with similar meanings have vectors that are geometrically close to each other.',ch:[2]},
  {t:'Emergent Abilities',d:'Capabilities that a model was not explicitly trained to perform, but which spontaneously appear when the model reaches a certain scale of parameters and training data (e.g., translation, logical reasoning).',ch:[13]},
  {t:'Feed-Forward Network (FFN)',d:'The second half of a Transformer block. After the Attention mechanism mixes information between tokens, the FFN processes each token individually to extract higher-level features.',ch:[4]},
  {t:'Hallucination',d:'When an LLM generates text that is grammatically correct and sounds highly confident, but is factually incorrect or entirely fabricated. A natural consequence of probabilistic text generation.',ch:[13]},
  {t:'In-Context Learning',d:'The ability of an LLM to learn how to perform a new task simply by seeing examples of that task within the prompt, without any changes to its underlying weights.',ch:[13]},
  {t:'KV Cache (Key-Value Cache)',d:'A crucial inference optimization that stores the calculated Key and Value matrices of previous tokens in memory. This prevents the model from having to recalculate the entire prompt from scratch for every new word it generates.',ch:[10]},
  {t:'Logits',d:'The raw, unnormalized mathematical scores produced by the final layer of the neural network for every possible token in the vocabulary. They are converted into probabilities using a softmax function.',ch:[9]},
  {t:'Mixture of Experts (MoE)',d:'An architectural technique where the Feed-Forward Network is split into multiple specialized "experts." For any given token, a router network activates only 1 or 2 experts, allowing the model to have massive parameter counts while keeping inference fast.',ch:[5]},
  {t:'Next-Token Prediction',d:'The fundamental objective used during the pre-training phase of an LLM. The model is given a sequence of text and must guess the very next word, adjusting its weights based on whether it was right or wrong.',ch:[6]},
  {t:'Parameters (Weights)',d:'The billions of numbers inside the neural network that are adjusted during training. They encode all the grammar, facts, and reasoning capabilities the model possesses.',ch:[5]},
  {t:'Pre-training',d:'The first and most expensive phase of creating an LLM, where a massive model is trained on trillions of words from the internet to learn the statistical structure of language via next-token prediction.',ch:[6]},
  {t:'Q/K/V (Query, Key, Value)',d:'The three vectors used in the Attention mechanism. A token uses its Query to ask what it needs, checks other tokens\' Keys to see if they have it, and extracts their Value if there is a match.',ch:[3]},
  {t:'Quantization',d:'A technique to make models smaller and faster by reducing the precision of their weights (e.g., converting 16-bit floating-point numbers to 4-bit integers), with minimal loss in output quality.',ch:[11]},
  {t:'Residual Connection',d:'Also known as a skip connection. A structural feature in Transformers where the original input to a layer is added to the output of that layer. This prevents the signal from dying out as it passes through dozens of layers.',ch:[4]},
  {t:'RLHF (Reinforcement Learning from Human Feedback)',d:'The alignment phase where human raters score the model\'s outputs, and the model is optimized to generate responses that maximize those human preference scores. This turns a text-predictor into a helpful assistant.',ch:[8]},
  {t:'Softmax',d:'A mathematical function applied at the very end of the model that converts the raw output scores (logits) into a probability distribution that sums to 100%.',ch:[9]},
  {t:'Temperature',d:'A parameter used during text generation that controls randomness. A temperature of 0 makes the model strictly deterministic (always picking the most likely token). Higher temperatures flatten the probability distribution, making the model more "creative" but prone to errors.',ch:[9]},
  {t:'Token',d:'The fundamental unit of text processed by an LLM. A token can be an entire word, a syllable, or a single character. 100 tokens is roughly equal to 75 English words.',ch:[1]},
  {t:'Transformer',d:'The neural network architecture introduced by Google in 2017 ("Attention Is All You Need") that relies entirely on self-attention mechanisms, dispensing with recurrence and convolutions. The foundation of all modern LLMs.',ch:[4]}
];

// Sort terms alphabetically
TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

// Build Alphabet Bar
ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }

  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }

  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }

  let currentLetter = '';
  let currentSection = null;

  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }

    const row = document.createElement('div');
    row.className = 'term-row';

    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;

    const bd = document.createElement('div');
    bd.className = 'term-body';

    const def = document.createElement('div');
    def.className = 'term-def';
    
    // Highlight search term if applicable
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }

    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));

    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
