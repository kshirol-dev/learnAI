:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}

<script>
const CHAPTERS={
  1:'01-the-reasoning-gap.html',
  2:'02-chain-of-thought-prompting.html',
  3:'03-tree-of-thought-and-search.html',
  4:'04-test-time-compute-scaling.html',
  5:'05-verification-and-reward-models.html',
  6:'06-tool-augmented-reasoning.html',
  7:'07-benchmarks-and-evaluation.html',
  8:'08-the-future-of-reasoning.html'
};

const TERMS=[
  {t:'Abstraction and Reasoning Corpus (ARC)',d:'A benchmark of few-shot visual grid puzzles designed to stress generalization and core reasoning priors rather than memorized facts. Often discussed alongside ARC-AGI framing for measuring progress on abstract tasks.',ch:[7,8]},
  {t:'Best-of-N Sampling',d:'Generate N candidate solutions (often with non-zero temperature) and select one using a verifier, reward model, or majority vote. A basic inference-time scaling strategy.',ch:[2,5]},
  {t:'Chain-of-Thought (CoT) Prompting',d:'Prompting strategy where the model is shown or encouraged to produce intermediate reasoning steps before a final answer. Popularized in large-scale LM work such as Wei et al. (2022).',ch:[1,2,4]},
  {t:'Chinchilla Scaling Laws',d:'Empirical scaling relationships (Hoffmann et al.) between model size, data, and compute for training. Often contrasted with test-time compute scaling, which spends extra inference compute per query.',ch:[4]},
  {t:'Compute-Optimal Inference',d:'Allocating different amounts of reasoning effort (thinking tokens, samples, or search depth) depending on task difficulty — e.g., configurable reasoning effort on reasoning-oriented APIs.',ch:[4]},
  {t:'DeepSeek-R1',d:'An open-weights reasoning-focused model family (2025) trained with large-scale reinforcement learning, widely cited as democratizing o-style reasoning research and deployment.',ch:[4,8]},
  {t:'Faithfulness (of CoT)',d:'The extent to which stated reasoning steps reflect the model\'s actual computation. Chains can look plausible yet rationalize incorrect answers.',ch:[2,5]},
  {t:'Few-Shot Prompting',d:'Providing several input–output examples in the prompt. In CoT, exemplars include intermediate steps so the model mimics step-by-step reasoning.',ch:[2]},
  {t:'Function Calling',d:'Structured tool interface where the model emits JSON (or similar) matching a schema; the host executes tools and returns results. Standard in production agents.',ch:[6]},
  {t:'GSM8K',d:'Grade-school math word-problem benchmark (~8K problems) introduced by Cobbe et al. (2021). A standard sanity check for multi-step arithmetic reasoning.',ch:[2,7]},
  {t:'GPQA',d:'Challenging multiple-choice science Q&A benchmark (biology, physics, chemistry). GPQA Diamond is a common filtered subset for evaluation.',ch:[7]},
  {t:'Graph-of-Thought',d:'Extension of tree-based reasoning where partial solutions can merge or form cycles, modeling convergent reasoning paths.',ch:[3]},
  {t:'Group Relative Policy Optimization (GRPO)',d:'RL algorithm family referenced in open reasoning-model recipes (e.g., DeepSeek-R1 technical materials) as an alternative to classical PPO-style updates for preference optimization.',ch:[4,8]},
  {t:'HumanEval',d:'Python function-synthesis benchmark evaluated with hidden unit tests; popularized pass@k metrics for code generation quality.',ch:[7]},
  {t:'Let\'s Verify Step by Step',d:'OpenAI research direction on process supervision: training or using models that provide step-level correctness signal for mathematical reasoning, motivating PRMs.',ch:[5]},
  {t:'MATH Benchmark',d:'Competition-level mathematics benchmark (Hendrycks et al.) with harder problems than GSM8K; commonly used to stress advanced reasoning and verification.',ch:[2,7]},
  {t:'Monte Carlo Tree Search (MCTS)',d:'Search algorithm combining tree exploration with random rollouts and value backups. Adapted to LLM reasoning as an alternative to simple beam search.',ch:[3]},
  {t:'Monte Carlo Estimation (for PRM labels)',d:'Automated method to label step quality by sampling many completions from a partial solution and measuring how often final answers are correct.',ch:[5]},
  {t:'Model Context Protocol (MCP)',d:'Emerging pattern for exposing tools/resources to models via standardized servers; complements function calling in agent stacks.',ch:[6]},
  {t:'Outcome Reward Model (ORM)',d:'Scorer trained on full solutions to predict whether the final answer is correct. Provides sparse feedback compared to PRMs.',ch:[5]},
  {t:'PAL (Program-Aided Language Models)',d:'Method where the LLM writes a program (commonly Python) and an interpreter executes it to obtain the answer (Gao et al., ICML 2023).',ch:[6]},
  {t:'pass@k',d:'Metric: success if any of k independent samples passes verification (widely used in code benchmarks like HumanEval).',ch:[7]},
  {t:'Process Reward Model (PRM)',d:'Model that assigns scores to intermediate reasoning steps, enabling denser training signal and finer-grained selection than ORMs.',ch:[5]},
  {t:'Process Supervision',d:'Training or preference optimization using step-level rewards rather than only final-answer correctness.',ch:[5]},
  {t:'Qwen QwQ',d:'Alibaba Qwen family reasoning models (e.g., QwQ-32B) publicized as using RL with reward models and rule-based verifiers; released with open weights for research and deployment.',ch:[4,8]},
  {t:'Reasoning Gap',d:'The mismatch between fluent language generation and reliable multi-step deduction, arithmetic, or planning on novel problems.',ch:[1]},
  {t:'ReAct',d:'Agent pattern interleaving natural language reasoning with tool actions and environment observations; a common production loop for tool-augmented models.',ch:[6]},
  {t:'Self-Consistency',d:'Decoding strategy that samples multiple CoT chains and aggregates answers (often majority vote), introduced by Wang et al. (2022).',ch:[2]},
  {t:'System 1 / System 2 (in AI)',d:'Analogy to Kahneman\'s dual-process theory: fast one-pass generation vs slower deliberate reasoning with extra steps or compute.',ch:[1,4]},
  {t:'Test-Time Compute Scaling',d:'Improving outputs by spending more inference compute (longer chains, more samples, search) rather than only enlarging pretraining.',ch:[3,4]},
  {t:'Thinking Tokens',d:'Internal tokens generated by reasoning-trained models before user-visible answers; associated with OpenAI o-series style training and inference.',ch:[4]},
  {t:'Toolformer',d:'Meta AI model (Schick et al., NeurIPS 2023; arXiv:2302.04761) that learns API calls via self-supervised selection of helpful tool invocations.',ch:[6]},
  {t:'Tool Injection',d:'Attack or failure mode where untrusted text causes unintended tool calls or arguments (e.g., malicious content in retrieved pages).',ch:[6]},
  {t:'Tree-of-Thought (ToT)',d:'Framework (Yao et al., NeurIPS 2023) that explores branching intermediate \'thoughts\' with search and evaluation instead of a single linear chain.',ch:[3]},
  {t:'Verification-Guided Search',d:'Using PRMs, ORMs, or external checkers to score partial solutions during beam search, sampling, or MCTS.',ch:[3,5]},
  {t:'Zero-Shot Chain-of-Thought',d:'Triggering step-by-step reasoning without exemplars, e.g., appending a phrase like \'Let\'s think step by step\' (Kojima et al., 2022).',ch:[2]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script></body>
