<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--orange-light) 0%,var(--amber-light) 40%,var(--slate-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--orange);padding:4px 12px;background:var(--orange-light);border:1px solid var(--orange-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}

.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--orange)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}

.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--orange-light);color:var(--orange)}.alpha-btn.active{background:var(--orange);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}

.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--orange);padding-bottom:8px;border-bottom:2px solid var(--orange-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}

@media(max-width:600px){body{padding:16px 10px 48px}.title-bar,.nav-bar,.search-bar,.alpha-bar{padding-left:18px;padding-right:18px}.glossary-body{padding-left:18px;padding-right:18px}.title-bar{flex-direction:column;align-items:flex-start;gap:8px}.term-row{flex-direction:column;gap:4px}.term-name{min-width:0}}

<body>
<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div>
      <h1>Harness Engineering Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the Harness Engineering course.</div>
    </div>
    <div class="tb-count" id="total-count">0 Terms</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-link"><span class="material-symbols-rounded">arrow_back</span> Back to Course</a>
    <a href="../index.html" class="nav-link"><span class="material-symbols-rounded">home</span> Learning Portal</a>
    <a href="key-insights.html" class="nav-link"><span class="material-symbols-rounded">summarize</span> View Key Insights</a>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'CLAUDE.md', 'Doom Loop')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>

  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>

</div>

<script>
const CHAPTERS={
  1:'01-what-is-harness-engineering.html',
  2:'02-model-vs-harness.html',
  3:'03-constraint-documents.html',
  4:'04-architectural-constraints.html',
  5:'05-review-pipelines.html',
  6:'06-memory-entropy.html',
  7:'07-orchestration-at-scale.html',
  8:'08-risks-governance.html'
};

const TERMS=[
  {t:'AGENTS.md',d:'A constraint document format used by Cursor and other platforms. Similar in purpose to CLAUDE.md but with platform-specific conventions. Part of the broader ecosystem of agent instruction files.',ch:[3]},
  {t:'Agent Registry',d:'A central catalog of all deployed AI agents within an organization, tracking their permissions, harnesses, owners, and activity. The first step in governing agent sprawl.',ch:[8]},
  {t:'Agent Sprawl',d:'The uncontrolled proliferation of AI agents deployed without central oversight. Research indicates 73% of enterprise agents are unmonitored "shadow agents" running without governance, logging, or security review.',ch:[8]},
  {t:'AutoHarness',d:'A paper from Google DeepMind (ICLR 2026) demonstrating that models can automatically generate effective harnesses for coding tasks. Small models with auto-generated harnesses outperformed larger models without them.',ch:[2,8]},
  {t:'Cleanup Agent',d:'An automated agent that periodically scans the codebase for entropy — inconsistent naming, dead code, stale documentation — and submits PRs to fix it. Essential for maintaining codebase health over time.',ch:[6]},
  {t:'CLAUDE.md',d:'Anthropic\'s constraint document format placed at the root of a repository. Contains project identity, architecture rules, code style conventions, testing requirements, and forbidden patterns. The most widely adopted constraint document format.',ch:[1,3,8]},
  {t:'Codebase Entropy',d:'The gradual degradation of codebase quality through inconsistent naming, pattern drift, documentation staleness, and style violations. Accumulates rapidly when AI agents generate code without strong constraints.',ch:[6]},
  {t:'Constraint Document',d:'A structured text file (CLAUDE.md, AGENTS.md, .cursorrules) that provides rules, conventions, architectural decisions, and behavioral guidelines to AI coding agents. The highest-leverage component of a harness.',ch:[1,3]},
  {t:'Constraint Violation Scanner',d:'An automated tool that periodically scans the codebase for violations of established constraints — checking naming conventions, dependency rules, pattern adherence, and documentation requirements.',ch:[6]},
  {t:'Deep Reference Guide',d:'The third tier of the 3-tier constraint architecture. Detailed specifications, API documentation, and implementation guides that agents load only when working on specific, complex tasks.',ch:[3]},
  {t:'Dependency Layering',d:'An architectural constraint that enforces a strict dependency hierarchy (e.g., Types → Config → Repo → Service → UI). Each layer can only import from layers below it. Enforced by CI linters.',ch:[4]},
  {t:'Doom Loop',d:'A failure mode where an AI agent endlessly cycles on the same problem — making a change, seeing it fail, reverting, trying again. Detected via max iterations, diff tracking, and issue counting. Mitigated by escalation rules.',ch:[5]},
  {t:'Enforcement Stack',d:'The layered system of automated checks that enforce constraints, ordered from fastest to most thorough: pre-commit hooks → linters → structural tests → LLM-based auditors.',ch:[4]},
  {t:'Entropy Budget',d:'A governance mechanism that sets a maximum rate of codebase change per sprint or time period. Prevents quality degradation from excessive AI-generated code by throttling the pace of change.',ch:[6]},
  {t:'Episodic Memory',d:'A memory system that saves successful task completions as structured records (task description, approach, outcome). These records serve as few-shot examples for future similar tasks, improving agent performance over time.',ch:[6]},
  {t:'Error Pattern Tracking',d:'Building a taxonomy of common agent failure modes — categorizing errors by type, frequency, and root cause. Used to improve constraints, add targeted lint rules, and train better few-shot examples.',ch:[6]},
  {t:'Harness',d:'The complete system surrounding an AI coding agent that makes it reliable: constraint documents, enforcement layer, review pipeline, memory system, and orchestration. The harness determines agent performance more than the model itself.',ch:[1,2]},
  {t:'Harness Engineering',d:'The software engineering discipline focused on building systems and infrastructure to control AI coding agents. Coined by Elvis Saravia in early 2026. Four aspects: constrain, inform, verify, correct.',ch:[1]},
  {t:'Human Review Gate',d:'The point in a review pipeline where human engineers review agent-generated code. Humans should focus on architectural decisions, business logic correctness, and edge cases — not formatting or style (which linters handle).',ch:[5]},
  {t:'LLM-Based Auditor',d:'An AI model used to review code for subjective quality criteria that deterministic linters cannot check — such as naming quality, code clarity, appropriate abstraction level, and adherence to project conventions.',ch:[4]},
  {t:'Maturity Model',d:'A four-level framework for harness adoption: Level 1 (Ad-Hoc) — no harness; Level 2 (Guided) — basic constraints; Level 3 (Systematic) — full enforcement and review pipeline; Level 4 (Autonomous) — self-improving harness.',ch:[7]},
  {t:'Multi-Agent Review',d:'A review pattern where a separate reviewer agent (often a different model or configuration) reviews the coding agent\'s output. The reviewer checks for constraint violations, architectural issues, and correctness.',ch:[5]},
  {t:'OpenAI Symphony',d:'OpenAI\'s internal orchestration system built in Elixir. Dispatches Codex agents for coding tasks with structured harness constraints. Used to manage agent fleets at scale.',ch:[7]},
  {t:'Pre-Completion Checklist',d:'A self-verification step where the agent runs through a structured checklist before declaring a task complete. Catches 30–50% of issues before human review. Items include: tests pass, no lint errors, constraints followed.',ch:[5]},
  {t:'Prompt Injection',d:'A security attack where malicious instructions are embedded in data that an agent processes (e.g., in tool outputs, user inputs, or even constraint documents). Every agent capability is a potential attack vector.',ch:[8]},
  {t:'Reasoning Sandwich',d:'A cost optimization pattern: use high-reasoning models (e.g., Claude Opus) for planning and review, medium-reasoning models (e.g., Claude Sonnet) for implementation. Optimizes cost without sacrificing quality on critical decisions.',ch:[5]},
  {t:'Rippable Harness',d:'A harness designed for replaceability — constraint content is separated from platform integration, orchestration has clean interfaces, and components can be swapped without rewriting the entire system.',ch:[8]},
  {t:'Root Rules',d:'The first tier of the 3-tier constraint architecture. Project-wide rules in CLAUDE.md covering project identity, architecture, code style, testing requirements, and forbidden patterns. Always loaded.',ch:[3]},
  {t:'Self-Verification Loop',d:'A pattern where the agent reviews its own output against a checklist or set of criteria before submitting. More effective when the verification prompt is different from the generation prompt.',ch:[5]},
  {t:'Shadow Agent',d:'An AI agent deployed by an individual developer or team without central oversight, governance, or security review. Part of the agent sprawl problem. 73% of enterprise agents are estimated to be shadow agents.',ch:[8]},
  {t:'Stripe Minions',d:'Stripe\'s internal system for managing AI coding agents at scale. Merges 1,000+ agent-generated PRs per week using tiered review (automated → agent review → human review for high-risk changes).',ch:[7]},
  {t:'Structural Test',d:'An automated test that verifies architectural invariants — e.g., "no file in /ui imports from /repo directly," "every service has a corresponding test file." Runs in CI to prevent architectural drift.',ch:[4]},
  {t:'Task-Specific Skill',d:'The second tier of the 3-tier constraint architecture. Focused instructions for specific task types (e.g., "how to add a new API endpoint") that agents load on demand via progressive disclosure.',ch:[3]},
  {t:'Terminal Bench 2.0',d:'A benchmark for evaluating AI coding agent performance. LangChain demonstrated that changing only the harness (not the model) improved scores from 52.8% to 66.5% — a 26% improvement.',ch:[2]},
  {t:'Three-Tier Architecture',d:'The recommended structure for constraint documents: Tier 1 (Root Rules) — always loaded, project-wide; Tier 2 (Task Skills) — loaded on demand for specific tasks; Tier 3 (Deep Reference) — detailed specs loaded rarely.',ch:[3]},
  {t:'Vibecoded Lint',d:'A lint rule specifically targeting common AI agent mistakes — such as creating "God files" (putting everything in one file), generating unused imports, or violating established patterns. Named for "vibe coding" culture.',ch:[4]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
