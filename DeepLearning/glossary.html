<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossary — Deep Learning Fundamentals</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 42 42'%3E%3Ccircle cx='21' cy='21' r='19' fill='%231e1b4b'/%3E%3Ccircle cx='21' cy='21' r='16' stroke='%23a5b4fc' stroke-width='1.5' stroke-dasharray='3 3' fill='none' opacity='.45'/%3E%3Ccircle cx='21' cy='12' r='3' fill='%2338bdf8'/%3E%3Ccircle cx='13' cy='26' r='3' fill='%2338bdf8'/%3E%3Ccircle cx='29' cy='26' r='3' fill='%2338bdf8'/%3E%3Ccircle cx='21' cy='21' r='4' fill='%23fff'/%3E%3Cline x1='21' y1='15' x2='21' y2='17' stroke='%23a5b4fc' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='15.4' y1='24.2' x2='17.5' y2='23' stroke='%23a5b4fc' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='26.6' y1='24.2' x2='24.5' y2='23' stroke='%23a5b4fc' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--blue-light) 0%,var(--violet-light) 40%,var(--slate-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--blue);padding:4px 12px;background:var(--blue-light);border:1px solid var(--blue-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}

.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}

.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--blue-light);color:var(--blue)}.alpha-btn.active{background:var(--blue);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}

.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--blue);padding-bottom:8px;border-bottom:2px solid var(--blue-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}
.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--blue-light);color:var(--blue);border:1px solid var(--blue-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--blue);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}
</style>
</head>
<body>
<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div>
      <h1>Deep Learning Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the Deep Learning Fundamentals course.</div>
    </div>
    <div class="tb-count" id="total-count">0 Terms</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-link"><span class="material-symbols-rounded">arrow_back</span> Back to Course</a>
    <a href="../index.html" class="nav-link"><span class="material-symbols-rounded">home</span> Learning Portal</a>
    <a href="key-insights.html" class="nav-link"><span class="material-symbols-rounded">summarize</span> View Key Insights</a>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'Transformer', 'Backpropagation')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>

  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>

</div>

<script>
const CHAPTERS={
  1:'01-from-neurons-to-networks.html',
  2:'02-training-deep-networks.html',
  3:'03-optimizers-and-learning-rates.html',
  4:'04-convolutional-neural-networks.html',
  5:'05-cnn-architectures.html',
  6:'06-recurrent-neural-networks.html',
  7:'07-lstms-grus-and-sequence-models.html',
  8:'08-autoencoders.html',
  9:'09-generative-adversarial-networks.html',
  10:'10-regularization-and-practical-training.html',
  11:'11-the-attention-mechanism.html',
  12:'12-the-transformer-architecture.html'
};

const TERMS=[
  {t:'Activation Function',d:'A non-linear function applied to a neuron\'s output (e.g., ReLU, sigmoid, tanh, GELU). Without activation functions, a neural network would be equivalent to a single linear transformation regardless of depth.',ch:[1]},
  {t:'Adam Optimizer',d:'An adaptive learning rate optimizer that combines momentum (exponential moving average of gradients) with RMSProp (per-parameter learning rate scaling). The default optimizer for most deep learning tasks.',ch:[3]},
  {t:'AdamW',d:'A variant of Adam that decouples weight decay from the gradient update. Fixes a subtle issue in the original Adam where L2 regularization interacts incorrectly with adaptive learning rates.',ch:[3]},
  {t:'AlexNet',d:'A deep CNN by Krizhevsky et al. (2012) that won ImageNet with a 10.8% top-5 error reduction over the runner-up. Proved that deep networks trained on GPUs could dominate computer vision.',ch:[5]},
  {t:'Attention Mechanism',d:'A mechanism that allows a model to focus on the most relevant parts of the input when producing each output. Computes weighted sums where the weights (attention scores) indicate relevance.',ch:[11,12]},
  {t:'Autoencoder',d:'A neural network trained to reconstruct its own input through a bottleneck layer. The bottleneck forces the network to learn a compressed representation of the data.',ch:[8]},
  {t:'Backpropagation',d:'The algorithm for computing gradients in neural networks by applying the chain rule of calculus backward through the network. Determines how much each weight contributed to the total error.',ch:[2]},
  {t:'Batch Normalization',d:'A technique that normalizes the inputs to each layer to have zero mean and unit variance during training. Stabilizes training, allows higher learning rates, and acts as a mild regularizer.',ch:[10]},
  {t:'Causal Masking',d:'A triangular attention mask that prevents each position from attending to future positions. Used in decoder-only Transformers (GPT, LLaMA) to enforce autoregressive generation.',ch:[12]},
  {t:'Convolutional Neural Network (CNN)',d:'A neural network architecture that uses learnable filters (kernels) that slide across the input to detect local patterns. Exploits spatial structure through weight sharing and local connectivity.',ch:[4,5]},
  {t:'Cross-Attention',d:'An attention mechanism where queries come from one sequence (e.g., the decoder) and keys/values come from another (e.g., the encoder). Used in encoder-decoder Transformers for translation and summarization.',ch:[11,12]},
  {t:'Data Augmentation',d:'Artificially expanding the training set by applying transformations (flips, rotations, crops, color jitter) to existing data. The single most effective regularization technique for computer vision.',ch:[10]},
  {t:'Decoder-Only Transformer',d:'A Transformer variant that uses only the decoder stack with causal masking. Generates text autoregressively (left to right). GPT, LLaMA, Claude, and Gemini are all decoder-only.',ch:[12]},
  {t:'Dropout',d:'A regularization technique that randomly sets a fraction of neuron activations to zero during training. Forces the network to learn redundant representations and prevents co-adaptation of neurons.',ch:[10]},
  {t:'Early Stopping',d:'Monitoring validation loss during training and stopping when it begins to increase. Prevents overfitting by halting training before the model starts memorizing the training data.',ch:[10]},
  {t:'Encoder-Decoder',d:'The original Transformer architecture with an encoder (bidirectional attention) and decoder (causal attention + cross-attention). Used for sequence-to-sequence tasks like translation. T5, BART, and Whisper use this design.',ch:[12]},
  {t:'Exploding Gradients',d:'When gradients grow exponentially during backpropagation through deep networks or long sequences, causing unstable training. Addressed with gradient clipping and careful initialization.',ch:[2]},
  {t:'Feedforward Network (FFN)',d:'The position-wise MLP in each Transformer block: Linear → activation → Linear. Applied independently to each token position. Believed to store factual knowledge learned during training.',ch:[12]},
  {t:'Generative Adversarial Network (GAN)',d:'A framework where two networks compete: a generator creates synthetic data and a discriminator tries to distinguish real from fake. Both improve through adversarial training.',ch:[9]},
  {t:'Gradient Descent',d:'An optimization algorithm that iteratively adjusts model parameters in the direction that reduces the loss function. The fundamental training algorithm for all neural networks.',ch:[2,3]},
  {t:'Grouped-Query Attention (GQA)',d:'A variant of multi-head attention that shares key and value heads across multiple query heads. Reduces memory usage during inference while maintaining most of the quality of full multi-head attention.',ch:[12]},
  {t:'GRU (Gated Recurrent Unit)',d:'A simplified LSTM with only two gates (reset and update) instead of three. Often performs comparably to LSTMs with fewer parameters and faster training.',ch:[7]},
  {t:'KV Cache',d:'A technique for efficient autoregressive inference in Transformers. Stores previously computed key and value tensors so they don\'t need to be recomputed for each new token.',ch:[12]},
  {t:'Layer Normalization',d:'Normalizes activations across the feature dimension (rather than the batch dimension like BatchNorm). Used in Transformers because it works with variable-length sequences and single samples.',ch:[10,12]},
  {t:'Learning Rate',d:'A hyperparameter that controls how much to adjust the model\'s weights during each optimization step. Too high causes instability; too low causes slow convergence.',ch:[3]},
  {t:'LSTM (Long Short-Term Memory)',d:'A recurrent architecture with three gates (forget, input, output) and a cell state that can carry information across many time steps. Solved the vanishing gradient problem for sequences.',ch:[7]},
  {t:'Mini-Batch SGD',d:'Processing small batches of training examples (typically 32-512) before each weight update. Balances the noise of single-sample SGD with the computational cost of full-batch gradient descent.',ch:[2]},
  {t:'Mode Collapse',d:'A failure mode in GAN training where the generator produces only a small variety of outputs that fool the discriminator, losing diversity in the generated data.',ch:[9]},
  {t:'Multi-Head Attention',d:'Running multiple attention operations in parallel, each with its own learned Q, K, V projections. Different heads can learn different types of relationships (syntactic, semantic, positional).',ch:[11,12]},
  {t:'Perceptron',d:'The simplest neural network unit: a weighted sum of inputs passed through an activation function. A single perceptron can only learn linearly separable patterns.',ch:[1]},
  {t:'Pooling',d:'A downsampling operation in CNNs that reduces the spatial dimensions of feature maps. Max pooling takes the maximum value in each window; average pooling takes the mean.',ch:[4]},
  {t:'Positional Encoding',d:'Information added to token embeddings to give the Transformer a sense of position in the sequence. Can be sinusoidal (fixed), learned, or rotary (RoPE).',ch:[12]},
  {t:'ReLU (Rectified Linear Unit)',d:'An activation function defined as max(0, x). Simple, fast, and largely solved the vanishing gradient problem for feedforward networks. The most widely used activation function.',ch:[1]},
  {t:'Residual Connection (Skip Connection)',d:'Adding the input of a layer directly to its output: y = F(x) + x. Enables training of very deep networks by providing gradient shortcuts. Introduced by ResNet (2015).',ch:[5,12]},
  {t:'ResNet',d:'Residual Network (He et al., 2015). Introduced skip connections that add the input of a block directly to its output. Enabled training networks with 100+ layers and won ImageNet 2015.',ch:[5]},
  {t:'RMSNorm',d:'Root Mean Square Normalization. A simplified version of LayerNorm that only normalizes by the RMS of activations (no mean centering). Faster and used in modern LLMs like LLaMA.',ch:[12]},
  {t:'RNN (Recurrent Neural Network)',d:'A neural network that processes sequences by maintaining a hidden state that gets updated at each time step. The hidden state acts as memory of previous inputs.',ch:[6]},
  {t:'RoPE (Rotary Position Embedding)',d:'A positional encoding method that rotates query and key vectors by their position, making attention scores naturally depend on relative distance. Used in LLaMA, Mistral, and most modern LLMs.',ch:[12]},
  {t:'Scaling Laws',d:'Empirical findings (Kaplan et al., 2020) that Transformer performance follows predictable power laws with model size, dataset size, and compute budget.',ch:[12]},
  {t:'Self-Attention',d:'An attention mechanism where queries, keys, and values all come from the same sequence. Each position attends to all other positions, computing a weighted combination based on relevance.',ch:[11,12]},
  {t:'StyleGAN',d:'A GAN architecture by NVIDIA that uses a style-based generator with progressive growing. Produces photorealistic images and allows fine-grained control over generated attributes.',ch:[9]},
  {t:'SwiGLU',d:'A gated activation function used in the FFN of modern Transformers (Shazeer, 2020). Combines Swish activation with a gating mechanism for better performance than ReLU or GELU.',ch:[12]},
  {t:'Transfer Learning',d:'Using a model pre-trained on a large dataset (e.g., ImageNet) as a starting point for a new task. Fine-tuning a pre-trained model is far more efficient than training from scratch.',ch:[5]},
  {t:'Transformer',d:'A neural network architecture built entirely from attention mechanisms, with no recurrence or convolutions. Proposed in "Attention Is All You Need" (Vaswani et al., 2017). The foundation of all modern LLMs.',ch:[12]},
  {t:'Universal Approximation Theorem',d:'The theorem stating that a neural network with a single hidden layer and sufficient neurons can approximate any continuous function to arbitrary precision. Depth is more efficient than width in practice.',ch:[1]},
  {t:'Vanishing Gradients',d:'When gradients shrink exponentially during backpropagation through deep networks or long sequences, making it impossible for early layers to learn. Addressed by ReLU, residual connections, and LSTMs.',ch:[2,6]},
  {t:'Variational Autoencoder (VAE)',d:'An autoencoder that encodes inputs as probability distributions (mean + variance) rather than fixed points. Enables smooth interpolation in latent space and generation of new data.',ch:[8]},
  {t:'Wasserstein GAN (WGAN)',d:'A GAN variant that uses the Wasserstein distance (Earth Mover\'s distance) instead of JS divergence. Provides more stable training and a meaningful loss metric that correlates with generation quality.',ch:[9]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
</body>
