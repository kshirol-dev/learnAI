<script>
const CHAPTERS={
  1:'01-what-are-multi-agent-systems.html',
  2:'02-architectures-and-paradigms.html',
  3:'03-communication-and-protocols.html',
  4:'04-coordination-and-cooperation.html',
  5:'05-multi-agent-planning-and-negotiation.html',
  6:'06-emergence-game-theory-and-incentives.html',
  7:'07-llm-based-multi-agent-frameworks.html',
  8:'08-evaluation-benchmarks-and-metrics.html',
  9:'09-safety-control-and-failure-modes.html',
  10:'10-production-patterns-and-future.html'
};

const TERMS=[
  {t:'Ablation Study',d:'Removing one agent at a time from a multi-agent system and measuring the impact on task success and cost. Used to verify each agent earns its keep and identify single points of failure.',ch:[8]},
  {t:'ACL (Agent Communication Language)',d:'A structured message format pairing a communicative act (performative) with content. FIPA ACL is the classic standard; modern equivalents use JSON with an explicit illocution field.',ch:[3]},
  {t:'Agent',d:'An autonomous entity that perceives its environment through sensors, makes decisions, and acts through effectors. In MAS, agents interact with other agents, not just the environment.',ch:[1,2]},
  {t:'Auction',d:'A structured negotiation mechanism where agents bid for tasks or resources. Types include first-price sealed-bid, Vickrey (second-price), and combinatorial auctions.',ch:[5,6]},
  {t:'AutoGen',d:'A Microsoft framework for orchestrating multiple LLM-powered agents with conversation patterns, tool use, and human-in-the-loop support.',ch:[1,7]},
  {t:'BDI (Beliefs, Desires, Intentions)',d:'An agent architecture separating what the agent thinks is true (beliefs), states it would like (desires), and committed plans (intentions). Supports graceful revision and reduces flip-flopping.',ch:[2]},
  {t:'Blackboard Architecture',d:'A shared structured memory where specialist agents read and write hypotheses or partial solutions. Modern analogues include shared vector stores and structured JSON state.',ch:[2,3]},
  {t:'Blast Radius',d:'The worst-case impact if a single agent goes rogue. Good architecture makes this bounded and reversible through sandboxing and budget envelopes.',ch:[9]},
  {t:'Budget Envelope',d:'A token and dollar cap assigned per task that halts execution if exceeded. Prevents unbounded cost from runaway multi-agent conversations.',ch:[9,10]},
  {t:'Canary Release',d:'Routing a small percentage of traffic to a new system version, comparing metrics, then promoting or rolling back. Essential for safe multi-agent deployments.',ch:[10]},
  {t:'Cascading Failure',d:'When one agent\'s error propagates through the system as other agents trust and build on the mistake. The top systemic risk in multi-agent systems.',ch:[9]},
  {t:'Circuit Breaker',d:'An automatic mechanism that degrades the system gracefully (e.g., falls back to single-agent mode) when error rates exceed a threshold.',ch:[9]},
  {t:'Collusion',d:'When agents coordinate to game the system, such as bid-rigging in auctions. Especially easy when agents share the same model weights and biases.',ch:[6]},
  {t:'Contract Net Protocol',d:'A coordination pattern where a manager announces a task, workers submit bids, and the manager awards a contract. Creates accountability through logged awards.',ch:[4]},
  {t:'Conversation Pattern',d:'The structure of multi-agent dialogue: round-robin, debate, reflection, or hierarchical. Each pattern suits different decision types.',ch:[7]},
  {t:'Coordination',d:'The process of selecting who does what, when, and with which resources in a multi-agent system. Prevents double booking, deadlocks, and duplicated work.',ch:[4]},
  {t:'Critical Path',d:'The longest sequential chain of agent calls in a workflow. Determines the latency floor; parallel branches are free latency.',ch:[10]},
  {t:'DAG (Directed Acyclic Graph)',d:'A task graph with explicit dependencies used to represent decomposed multi-agent plans. Enables parallel execution where no dependency exists.',ch:[5,10]},
  {t:'Debate Pattern',d:'A conversation pattern where two agents argue opposing positions and a judge picks the winner. Effective for reducing hallucination on high-stakes decisions.',ch:[7]},
  {t:'Deliberative Agent',d:'An agent that maintains an explicit world model, formulates goals, and searches over action sequences. Produces explainable plans but at higher computational cost.',ch:[2]},
  {t:'Emergence',d:'When macro-level patterns arise from micro-level agent interactions without explicit programming. Can be positive (creative solutions) or negative (echo chambers, cost spirals).',ch:[6]},
  {t:'Felicity Conditions',d:'Preconditions for a speech act to be valid: is the speaker authorized? Is the proposition grounded? Used to validate agent commitments.',ch:[3]},
  {t:'Free-Riding',d:'When one agent coasts on others\' work without contributing proportionally. Mitigated by contribution tracking and reputation systems.',ch:[6]},
  {t:'Game Theory',d:'The study of strategic interaction among agents with individual utility functions. Provides the language of players, strategies, payoffs, and equilibria.',ch:[6]},
  {t:'Golden Transcript',d:'An expert-annotated conversation used as a reference for evaluating multi-agent dialogue quality. Stored as test artifacts and replayed after changes.',ch:[3,8]},
  {t:'Guardrail',d:'An automated input/output filter that screens messages for prompt injection, policy violations, PII, and schema compliance. Must run at every agent boundary.',ch:[9]},
  {t:'HTN (Hierarchical Task Network)',d:'A planning method that breaks goals into subtasks via methods, producing a hierarchy of actions. Used for multi-agent plan decomposition.',ch:[5]},
  {t:'Human-in-the-Loop (HITL)',d:'Patterns where humans approve, review, or override agent decisions. Includes approval gates, review checkpoints, and escalation on low confidence.',ch:[7]},
  {t:'Hybrid Architecture',d:'Combining reactive (fast reflex) and deliberative (slow planning) layers. Lower layers handle emergencies; higher layers issue subgoals.',ch:[2]},
  {t:'Incentive Compatibility',d:'A mechanism design property where truth-telling is the optimal strategy for each agent. Achieved through rules like Vickrey auctions.',ch:[6]},
  {t:'Inter-Agent Prompt Injection',d:'A malicious input to one agent that crafts a message hijacking another agent downstream. The most dangerous injection vector in multi-agent systems.',ch:[9]},
  {t:'Joint Intention',d:'A formalization of teamwork where agents share mutual belief in a goal and commitment to helping each other achieve it.',ch:[4,5]},
  {t:'Kill Switch',d:'A manual mechanism to halt all agent activity immediately. Must be tested regularly; an untested kill switch is a false sense of security.',ch:[9]},
  {t:'Lease',d:'A time-limited claim on a task that expires if the agent crashes or fails to renew. Enables recovery from agent failures in decentralized allocation.',ch:[4]},
  {t:'LLM-as-Judge',d:'Using a language model to evaluate multi-turn conversation quality against rubrics. Applied to coherence, information flow, turn efficiency, and termination quality.',ch:[8]},
  {t:'Mechanism Design',d:'Reverse game theory: given a desired outcome, design rules (auctions, taxes, rewards) so self-interested agents produce it.',ch:[6]},
  {t:'Memory (Agent)',d:'Short-term (conversation buffer), long-term (vector store, KV), and shared (team knowledge base) state. Requires eviction policies and access control.',ch:[7]},
  {t:'Nash Equilibrium',d:'A strategy profile where no single agent benefits from unilaterally changing its strategy. Does not guarantee the outcome is optimal.',ch:[6]},
  {t:'Negotiation',d:'Iterative proposals and counter-proposals between agents to resolve conflicts over resources or schedules. Requires max rounds and deadline pressure.',ch:[5]},
  {t:'Norm',d:'An obligation, prohibition, or sanction that agents follow. Implemented as policy-as-code checked before tool execution.',ch:[4]},
  {t:'Observability',d:'Trace IDs, per-agent metrics (tokens, latency, cost), conversation replays, and dashboards showing the critical path through the agent graph.',ch:[7,8,10]},
  {t:'Ontology',d:'A shared vocabulary fixing the meaning of predicates and objects. Prevents two agents from using the same word for different concepts.',ch:[3]},
  {t:'Orchestrator',d:'A central agent or service that receives inputs, assigns subtasks, and merges results. Provides a single point of policy and logging but risks bottleneck.',ch:[2,4,10]},
  {t:'Pareto Frontier',d:'The set of configurations where no other configuration is better on both quality and cost. Used to evaluate multi-agent system trade-offs.',ch:[8]},
  {t:'Partial-Order Plan',d:'A plan with ordering constraints but flexibility in scheduling. Allows parallelism where no dependency exists between steps.',ch:[5]},
  {t:'Performative',d:'The communicative act type in a message (inform, request, commit, cfp). Receivers branch on act type for policy hooks and testable state machines.',ch:[3]},
  {t:'Plan Merging',d:'Combining partial plans from multiple agents and checking for resource conflicts, causal threats, and ordering violations before execution.',ch:[5]},
  {t:'Prisoner\'s Dilemma',d:'A game where individually rational defection leads to collectively worse outcomes. Recurs in MAS as duplicated work or free-riding.',ch:[6]},
  {t:'Protocol',d:'A specification of legal message sequences: who may speak, retries, timeouts, and terminal states. Without termination rules, agents oscillate.',ch:[3]},
  {t:'Reactive Agent',d:'An agent that maps situations to actions with little or no lookahead. Fast and predictable but limited in long-horizon planning.',ch:[2]},
  {t:'Regression Suite',d:'A set of deterministic-seed replays or statistical tests that catch behavioral regressions when prompts, models, or tools change.',ch:[8]},
  {t:'Replanning',d:'Re-generating part or all of a plan when a monitor detects deviation. Options: local patch, subgraph replan, or full replan.',ch:[5]},
  {t:'Reputation System',d:'Scores assigned to agents based on past cooperation history. Low-reputation agents get fewer tasks or higher scrutiny.',ch:[6]},
  {t:'Role Specialization',d:'Assigning each agent a distinct system prompt defining its role, expertise, constraints, and output format. Keeps roles narrow and testable.',ch:[7]},
  {t:'Runbook',d:'A documented procedure for diagnosing and responding to a specific production alert. Every alert needs one.',ch:[8,10]},
  {t:'Sandbox',d:'An isolated execution environment limiting what an agent can affect: file system, network, database, and spending. Bounds blast radius.',ch:[9]},
  {t:'Speech Act',d:'Treating utterances as actions: inform (assert), request (ask to act), commit (obligate future behavior). Distinguishes opinions from commitments.',ch:[3]},
  {t:'Stag Hunt',d:'A coordination game where cooperation yields the best payoff but carries risk if the other agent defects. Models coordination risk in MAS.',ch:[6]},
  {t:'Stigmergy',d:'Indirect coordination where agents leave traces in an environment that others react to. Useful for exploration but risky for compliance tasks.',ch:[4]},
  {t:'Subsumption Architecture',d:'A reactive architecture stacking simple behaviors that run in parallel and compete for control. Originated in behavior-based robotics.',ch:[2]},
  {t:'Tit-for-Tat',d:'A strategy in iterated games: cooperate first, then mirror the other agent\'s last move. Simple, effective, and forgiving.',ch:[6]},
  {t:'Tool Registry',d:'A mapping of function names to implementations that agents can call. Key design choices: which agents get which tools (least privilege) and approval gates.',ch:[7]},
  {t:'Trace ID',d:'A unique identifier linking all messages, tool calls, and decisions within a single task. Essential for debugging and cost attribution.',ch:[7,8,10]},
  {t:'Vickrey Auction',d:'A second-price sealed-bid auction where the winner pays the second-highest bid. Encourages truthful bidding as a dominant strategy.',ch:[5,6]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script></body>
