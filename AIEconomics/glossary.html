<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--green-light) 0%,var(--teal-light) 40%,var(--slate-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--green);padding:4px 12px;background:var(--green-light);border:1px solid var(--green-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}
.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}
.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--green-light);color:var(--green)}.alpha-btn.active{background:var(--green);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}
.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--green);padding-bottom:8px;border-bottom:2px solid var(--green-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}
.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--green-light);color:var(--green);border:1px solid var(--green-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--green);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}
@media(max-width:600px){body{padding:16px 10px 48px}.title-bar,.nav-bar,.search-bar,.alpha-bar{padding-left:18px;padding-right:18px}.glossary-body{padding-left:18px;padding-right:18px}.title-bar{flex-direction:column;align-items:flex-start;gap:8px}.term-row{flex-direction:column;gap:4px}.term-name{min-width:0}}

<body>
<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div>
      <h1>AI Economics &amp; Cost Engineering Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the AI Economics &amp; Cost Engineering course.</div>
    </div>
    <div class="tb-count" id="total-count">0 Terms</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-link"><span class="material-symbols-rounded">arrow_back</span> Back to Course</a>
    <a href="../index.html" class="nav-link"><span class="material-symbols-rounded">home</span> Learning Portal</a>
    <a href="key-insights.html" class="nav-link"><span class="material-symbols-rounded">summarize</span> View Key Insights</a>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'Token', 'GPU', 'FinOps')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>

  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>

</div>

<script>
const CHAPTERS={
  1:'01-what-is-a-token.html',
  2:'02-the-token-price-tag.html',
  3:'03-hidden-multipliers.html',
  4:'04-real-world-bills.html',
  5:'05-gpu-infrastructure.html',
  6:'06-optimization-playbook.html',
  7:'07-agent-cost-engineering.html',
  8:'08-finops-roi-future.html'
};

const TERMS=[
  {t:'API (Application Programming Interface)',d:'A hosted service that lets developers send text to an LLM and receive responses without managing infrastructure. The dominant consumption model for AI — used by 87% of teams. Pricing is per-token.',ch:[1,4,5]},
  {t:'Attention Mechanism',d:'The core computation in Transformer models that compares every token to every other token. Scales quadratically — O(n²) — meaning doubling context length quadruples compute cost. 128K tokens = 16 billion comparisons per layer.',ch:[3]},
  {t:'Batch API',d:'An asynchronous processing mode offered by providers (OpenAI, Anthropic, Google) that processes requests in bulk with a 24-hour SLA. Typically 50% cheaper than real-time API calls. Ideal for analytics, report generation, and offline processing.',ch:[6]},
  {t:'BPE (Byte Pair Encoding)',d:'The tokenization algorithm used by most modern LLMs (GPT, Claude, Gemini). Starts with individual bytes and iteratively merges the most frequent adjacent pairs to build a vocabulary of ~100K–200K sub-word units.',ch:[1]},
  {t:'Budget Model',d:'The cheapest tier of LLMs, priced at $0.05–$0.40/M input tokens. Examples: GPT-4o mini ($0.15/M), Claude 3.5 Haiku ($0.80/M), Gemini 2.0 Flash ($0.10/M). Suitable for classification, extraction, and simple Q&A.',ch:[1,2,6]},
  {t:'Cached Tokens',d:'Tokens from a previously seen prompt prefix that can be served from cache rather than recomputed. Providers offer 50–90% discounts on cached tokens. Anthropic charges $0.30/M for cached vs $3/M for fresh input on Claude 3.5 Sonnet.',ch:[3,6]},
  {t:'Cloud GPU',d:'GPU compute rented from cloud providers (AWS, Azure, GCP, Lambda Labs, CoreWeave). Pricing varies 3.2x across providers for equivalent hardware. Hidden costs include egress fees, virtualization overhead, and minimum commitments.',ch:[5]},
  {t:'Context Surcharge',d:'A price multiplier applied when using very long context windows. Anthropic and Google charge 2x the standard rate for prompts exceeding 200K tokens. Effectively doubles the per-token cost for long-document processing.',ch:[3]},
  {t:'Context Window',d:'The maximum number of tokens an LLM can process in a single request. Ranges from 8K (small models) to 2M (Gemini). Larger windows cost more due to quadratic attention scaling. The "shipping container" that determines what the model can see.',ch:[1,3]},
  {t:'Cost Collapse',d:'The dramatic decline in LLM pricing over time. GPT-4 launched at $30/M input tokens in March 2023; equivalent capability costs $0.15/M in March 2026 — a 200x reduction. Driven by hardware improvements, competition, and architectural innovations.',ch:[1,8]},
  {t:'Cost-per-Task',d:'The total cost to complete one unit of work (e.g., one customer support ticket, one code review, one document summary). The most meaningful cost metric because it accounts for retries, multi-step workflows, and overhead.',ch:[4,7]},
  {t:'Distillation',d:'Training a smaller, cheaper model to replicate the behavior of a larger, more expensive model on a specific task. Achieves 5–30x cost reduction while retaining 95–97% of quality. OpenAI, Anthropic, and Google all offer distillation APIs.',ch:[6]},
  {t:'Doom Loop',d:'When an AI agent gets stuck in a repetitive cycle — retrying failed approaches, generating excessive tokens, and burning through budget without making progress. Documented incidents include $47,000 in 11 days and 2.3M unintended API calls.',ch:[7]},
  {t:'Egress Fees',d:'Charges for transferring data out of a cloud provider\'s network. Often overlooked in GPU cost calculations. Can add 5–15% to total cloud GPU costs, especially for inference workloads that return large outputs.',ch:[5]},
  {t:'FinOps (Financial Operations)',d:'The practice of bringing financial accountability to cloud and AI spending. Traditional FinOps focused on infrastructure; AI FinOps extends this to model costs, token usage, and AI-specific metrics. A leadership imperative per Gartner and Forbes 2026.',ch:[8]},
  {t:'Flagship Model',d:'The most capable (and expensive) tier of LLMs, priced at $10–$150/M input tokens. Examples: GPT-4.5 ($75/M), Claude 3.5 Opus ($15/M), o1-pro ($150/M). Reserved for complex reasoning, creative work, and high-stakes decisions.',ch:[1,2]},
  {t:'GPU (Graphics Processing Unit)',d:'The primary hardware for AI inference and training. NVIDIA dominates with 80%+ market share. Key models: H100 ($25–40K), H200 ($30–45K), B200 ($40–50K). Manufacturing cost for B200 is ~$6,400 (84% margin).',ch:[5]},
  {t:'GPU Utilization',d:'The percentage of time a GPU is actively processing requests vs sitting idle. Industry average is 15–30%. Low utilization is the silent killer of self-hosting economics — 20% utilization means 5x higher effective cost per token.',ch:[5]},
  {t:'Guardrails',d:'Automated limits and controls that prevent runaway AI costs. Includes per-request token limits, per-agent budget caps, anomaly detection alerts, and hard kill switches. Essential for agent deployments.',ch:[7]},
  {t:'H100',d:'NVIDIA\'s workhorse datacenter GPU (Hopper architecture, 2023). 80GB HBM3 memory, ~$25–40K purchase price. The baseline for cloud GPU pricing comparisons. Being superseded by H200 and B200.',ch:[5]},
  {t:'Hidden Costs',d:'Expenses beyond the sticker price of API tokens. Includes reasoning tokens, context surcharges, infrastructure overhead, engineering time, monitoring tools, and error handling. Hidden costs typically exceed API costs by 2.3x.',ch:[3,4,8]},
  {t:'Inference',d:'The process of running a trained model to generate predictions or text. Accounts for 85–90% of total AI compute spending (vs 10–15% for training). The dominant cost driver for production AI systems.',ch:[1,5]},
  {t:'Input Tokens',d:'Tokens sent to the model — the user\'s question, system prompt, conversation history, RAG documents, and tool schemas. Processed in parallel (fast and cheap). Priced lower than output tokens, typically 3–8x less.',ch:[2,3]},
  {t:'KV-Cache Hit Rate',d:'The percentage of tokens served from cache vs freshly computed. The single most important production cost metric. High hit rates (>80%) indicate effective prompt caching and stable prompt prefixes.',ch:[6]},
  {t:'Mid-Tier Model',d:'The middle pricing tier of LLMs, at $1–$10/M input tokens. Examples: GPT-4o ($2.50/M), Claude 3.5 Sonnet ($3/M), Gemini 1.5 Pro ($1.25/M). The sweet spot for most production workloads.',ch:[1,2]},
  {t:'Model Routing',d:'Directing different types of requests to different models based on complexity, cost, and quality requirements. A classifier (often a small LLM) triages incoming requests. Achieves 40–60% cost savings with minimal quality impact.',ch:[6]},
  {t:'NVIDIA',d:'The dominant GPU manufacturer for AI workloads, with 80%+ market share. Key product lines: H100 (Hopper), H200 (Hopper refresh), B200 (Blackwell), GB200 (Blackwell NVL), and the upcoming Vera Rubin architecture.',ch:[5]},
  {t:'O(n²) Scaling',d:'The quadratic relationship between context length and attention computation cost. If 10K tokens costs $X, then 20K tokens costs $4X, 40K costs $16X, and 128K costs $164X. The fundamental reason long contexts are expensive.',ch:[3]},
  {t:'Output Tokens',d:'Tokens generated by the model — the response text. Generated sequentially (one at a time), requiring a full forward pass per token. This sequential nature makes output 3–8x more expensive than input.',ch:[2,3]},
  {t:'Portfolio Approach',d:'Managing AI investments as a diversified portfolio: 60–70% in routine automation (low risk, steady returns), 20–30% in targeted improvements (medium risk), and 5–10% in transformational bets (high risk, high potential).',ch:[8]},
  {t:'Prompt Caching',d:'A provider feature that caches the KV-cache states of frequently repeated prompt prefixes (system prompts, tool schemas). Reduces cost by 50–90% on cached portions and improves latency by 13–31%. Takes ~10 minutes to enable.',ch:[3,6]},
  {t:'Prompt Compression',d:'Techniques to reduce the token count of prompts without losing essential information. Includes removing redundant instructions, using structured formats, shortening few-shot examples, and constraining output length. Saves 15–30%.',ch:[6]},
  {t:'Reasoning Tokens',d:'Internal "thinking" tokens generated by reasoning models (o1, o3, DeepSeek R1) that are invisible in the response but billed at output token rates. A simple question can generate 5,000–50,000 reasoning tokens. The "underwater" part of the iceberg.',ch:[3]},
  {t:'ROI (Return on Investment)',d:'The financial return generated by AI investments relative to their cost. Average ROI for successful deployments is 3.5x, but 95% of pilots fail to show measurable returns (MIT). Measurement requires both financial and nonfinancial metrics.',ch:[8]},
  {t:'Self-Hosting',d:'Running LLMs on your own GPU infrastructure instead of using API providers. Only economical at >10B tokens/month or when regulatory requirements mandate it. Hidden costs (networking, cooling, engineering) are 3–5x the raw GPU price.',ch:[5]},
  {t:'Semantic Caching',d:'Caching LLM responses based on the semantic meaning of queries rather than exact text matches. If a new query is semantically similar to a cached one (>95% similarity), the cached response is returned. Saves 30–60% on repetitive workloads.',ch:[6]},
  {t:'Sticker Price',d:'The advertised per-token price from an API provider. Often misleading because it excludes reasoning tokens, context surcharges, retries, and overhead. Real cost is typically 2–20x the sticker price depending on the workload.',ch:[3,4]},
  {t:'TCO (Total Cost of Ownership)',d:'The complete cost of an AI system over its lifetime, including API costs, infrastructure, engineering time, monitoring, maintenance, and opportunity costs. Hidden costs are 40–60% of total investment. 60% of 5-year TCO occurs after the initial build.',ch:[8]},
  {t:'Tiktoken',d:'OpenAI\'s open-source tokenizer library. Used to count tokens before sending requests to the API, enabling accurate cost estimation. Supports GPT-4, GPT-4o, and other OpenAI model tokenization schemes.',ch:[1]},
  {t:'Token',d:'The fundamental billing unit of LLM APIs. A sub-word unit of roughly 3–4 characters or 0.75 English words, created by BPE tokenization. "Economics" = 1 token. "Tokenization" = 2 tokens. All AI costs ultimately trace back to token counts.',ch:[1,2,3,4]},
  {t:'Token Budget',d:'A strategic allocation of how many tokens to spend on different parts of a request — system prompt, user input, RAG context, conversation history, and response. Helps control costs and prevent context window overflow.',ch:[4,7]},
  {t:'Tokens per Dollar',d:'A metric for comparing model value. Budget models deliver ~6.7M tokens/$1 (GPT-4o mini). Flagship models deliver ~13K tokens/$1 (GPT-4.5). A 500x difference that makes model selection the highest-leverage cost decision.',ch:[1,2]},
  {t:'Transformer',d:'The neural network architecture underlying all modern LLMs (GPT, Claude, Gemini, Llama). Uses self-attention to process tokens, which scales quadratically with context length — the root cause of long-context costs.',ch:[1,3]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
</body>
