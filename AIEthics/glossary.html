<style>
:root{--bg:#f6f7fb;--bg-white:#fff;--bg-muted:#f0f2f7;--border:#dfe3ed;--border-light:#eaedf4;--text-1:#1b2035;--text-2:#505872;--text-3:#8892ab;--blue:#2563eb;--blue-light:#eff6ff;--blue-border:#bfdbfe;--violet:#7c3aed;--violet-light:#ede9fe;--violet-border:#c4b5fd;--pink:#db2777;--pink-light:#fdf2f8;--pink-border:#f9a8d4;--teal:#0d9488;--teal-light:#f0fdfa;--teal-border:#99f6e4;--amber:#d97706;--amber-light:#fffbeb;--amber-border:#fcd34d;--green:#16a34a;--green-light:#f0fdf4;--green-border:#bbf7d0;--red:#dc2626;--red-light:#fef2f2;--red-border:#fecaca;--orange:#ea580c;--orange-light:#fff7ed;--orange-border:#fed7aa;--slate:#64748b;--slate-light:#f1f5f9;--shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:12px;--radius-lg:20px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text-1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 20px 60px}.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
.canvas{width:100%;max-width:1100px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.title-bar{padding:24px 36px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--pink-light) 0%,var(--red-light) 40%,var(--slate-light) 100%)}
.title-bar .tb-icon{width:48px;height:48px;border-radius:12px;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}.tb-icon .material-symbols-rounded{font-size:26px}
.title-bar h1{font-size:20px;font-weight:800;letter-spacing:-.5px}.title-bar .tb-sub{font-size:11px;color:var(--text-2);margin-top:3px}
.tb-count{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--pink);padding:4px 12px;background:var(--pink-light);border:1px solid var(--pink-border);border-radius:6px;margin-left:auto;white-space:nowrap}
.nav-bar{padding:12px 36px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;background:var(--bg-white)}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;font-size:10px;font-weight:600;text-decoration:none;color:var(--text-3);background:var(--bg-muted);transition:all .15s}.nav-link:hover{color:var(--text-1);background:var(--border)}.nav-link .material-symbols-rounded{font-size:15px}

.search-bar{padding:16px 36px;border-bottom:1px solid var(--border-light);background:var(--bg-muted);display:flex;align-items:center;gap:12px}
.search-wrap{flex:1;position:relative}.search-wrap .material-symbols-rounded{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-3)}
.search-input{width:100%;padding:10px 14px 10px 40px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13px;background:var(--bg-white);color:var(--text-1);outline:none;transition:border-color .15s}.search-input:focus{border-color:var(--pink)}
.search-input::placeholder{color:var(--text-3)}
.search-count{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--text-3);white-space:nowrap}

.alpha-bar{padding:10px 36px;border-bottom:1px solid var(--border-light);display:flex;flex-wrap:wrap;gap:2px;background:var(--bg-white)}
.alpha-btn{width:30px;height:28px;border:none;border-radius:6px;background:transparent;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text-3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{background:var(--pink-light);color:var(--pink)}.alpha-btn.active{background:var(--pink);color:#fff}
.alpha-btn.disabled{opacity:.3;cursor:default;pointer-events:none}

.glossary-body{padding:0 36px 24px}
.letter-section{padding-top:20px}
.letter-head{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--pink);padding-bottom:8px;border-bottom:2px solid var(--pink-border);margin-bottom:4px}
.term-row{padding:12px 0;border-bottom:1px solid var(--border-light);display:flex;gap:16px;align-items:flex-start}.term-row:last-child{border-bottom:none}
.term-name{font-size:13px;font-weight:700;min-width:180px;flex-shrink:0;padding-top:2px}
.term-body{flex:1;min-width:0}
.term-def{font-size:12px;color:var(--text-2);line-height:1.65}
.term-def strong{color:var(--text-1);font-weight:600}
.term-refs{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.term-ref{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--pink-light);color:var(--pink);border:1px solid var(--pink-border);text-decoration:none;transition:all .15s}.term-ref:hover{background:var(--pink);color:#fff}
.no-results{padding:40px 0;text-align:center;color:var(--text-3);font-size:13px;display:none}

<body>
<div class="canvas">
  <div class="title-bar">
    <div class="tb-icon"><span class="material-symbols-rounded">dictionary</span></div>
    <div>
      <h1>AI Ethics &amp; Responsible AI Glossary</h1>
      <div class="tb-sub">Core terminology and definitions from the AI Ethics &amp; Responsible AI course.</div>
    </div>
    <div class="tb-count" id="total-count">0 Terms</div>
  </div>

  <div class="nav-bar">
    <a href="index.html" class="nav-link"><span class="material-symbols-rounded">arrow_back</span> Back to Course</a>
    <a href="../index.html" class="nav-link"><span class="material-symbols-rounded">home</span> Learning Portal</a>
    <a href="key-insights.html" class="nav-link"><span class="material-symbols-rounded">summarize</span> View Key Insights</a>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <span class="material-symbols-rounded">search</span>
      <input type="text" class="search-input" id="search-input" placeholder="Search for a term (e.g., 'Differential Privacy', 'Fairness')...">
    </div>
    <div class="search-count" id="search-count"></div>
  </div>

  <div class="alpha-bar" id="alpha-bar"></div>

  <div class="glossary-body" id="glossary-body"></div>
  <div class="no-results" id="no-results">No terms found matching your search.</div>

</div>

<script>
const CHAPTERS={
  1:'01-why-ai-ethics-matters.html',
  2:'02-bias-in-ai-systems.html',
  3:'03-fairness-definitions-and-metrics.html',
  4:'04-bias-mitigation-techniques.html',
  5:'05-explainability-and-interpretability.html',
  6:'06-privacy-and-data-rights.html',
  7:'07-llm-specific-ethics.html',
  8:'08-ai-governance-and-regulation.html',
  9:'09-building-ethical-ai-teams.html',
  10:'10-the-future-of-ai-ethics.html'
};

const TERMS=[
  {t:'Algorithmic Impact Assessment',d:'A systematic evaluation of the potential impact of an AI system on individuals and society before deployment. Required by Canada\'s proposed AIDA and recommended by the EU AI Act for high-risk systems.',ch:[8]},
  {t:'Alignment',d:'The challenge of ensuring AI systems pursue goals that are aligned with human values and intentions. Key sub-problems include specification (can\'t precisely define values), reward hacking, and deceptive alignment.',ch:[10]},
  {t:'Bias Audit',d:'Systematic testing for discriminatory outcomes across protected groups. NYC Local Law 144 (2023) requires annual bias audits for automated employment decision tools.',ch:[2,3,8]},
  {t:'C2PA',d:'Content Authenticity Initiative — a technical standard for cryptographic provenance of media content. Embeds metadata proving where content originated and whether it was AI-generated.',ch:[7]},
  {t:'Calibration',d:'A fairness definition requiring that when a model predicts a probability (e.g., 70% risk), that probability should be equally accurate across all demographic groups.',ch:[3]},
  {t:'Constitutional AI',d:'An alignment technique (Anthropic) where AI principles ("constitution") guide the model to critique and revise its own outputs. More scalable than pure RLHF because it reduces the need for human feedback on every response.',ch:[4,7,10]},
  {t:'Counterfactual Testing',d:'A bias detection method that changes a protected attribute (e.g., race, gender) in the input and checks whether the model\'s output changes. If it does, the model may be using that attribute inappropriately.',ch:[2]},
  {t:'Data Colonialism',d:'The extraction of data from developing countries to train AI models that primarily benefit wealthy nations. A form of digital resource extraction that raises equity concerns.',ch:[10]},
  {t:'Data Minimization',d:'A core GDPR principle requiring organizations to collect only the personal data strictly necessary for the specified purpose. For ML, this means limiting features, setting retention limits, and using synthetic data where possible.',ch:[6]},
  {t:'Data Protection Impact Assessment (DPIA)',d:'Required by GDPR for high-risk data processing. Evaluates privacy risks and mitigations before deploying AI systems that process personal data.',ch:[6,8]},
  {t:'Deceptive Alignment',d:'A concerning behavior where AI models strategically appear aligned during training while pursuing hidden objectives at deployment. Demonstrated by Anthropic/Redwood Research (2025).',ch:[10]},
  {t:'Deepfake',d:'AI-generated or AI-manipulated media (images, audio, video) depicting events that never happened. The most common use (~96%) is non-consensual intimate imagery. Legislation exists in 40+ US states.',ch:[7]},
  {t:'Demographic Parity',d:'A fairness definition requiring that the selection rate (positive outcome rate) is equal across all demographic groups, regardless of the true positive rate. Also called statistical parity.',ch:[3]},
  {t:'Differential Privacy',d:'A mathematical framework that guarantees the output of an analysis doesn\'t change significantly whether any single individual\'s data is included or not. The privacy parameter ε (epsilon) controls the privacy-utility trade-off.',ch:[6]},
  {t:'Disparate Impact',d:'A legal standard where a practice is discriminatory if it disproportionately affects a protected group, even without discriminatory intent. The 80% rule: if a group\'s selection rate is less than 80% of the highest group\'s rate, disparate impact may exist.',ch:[2,3]},
  {t:'DP-SGD',d:'Differentially Private Stochastic Gradient Descent — applies differential privacy during model training by clipping gradients and adding Gaussian noise. Implemented in libraries like Opacus (PyTorch).',ch:[6]},
  {t:'Equalized Odds',d:'A fairness definition requiring that the model\'s true positive rate and false positive rate are equal across all demographic groups. Ensures equal error rates regardless of group membership.',ch:[3]},
  {t:'EU AI Act',d:'The world\'s first comprehensive AI law (2024). Classifies AI systems into four risk tiers: unacceptable (banned), high-risk, limited-risk, and minimal-risk. Prohibited practices effective Feb 2025; high-risk rules by Aug 2026.',ch:[1,5,8]},
  {t:'ExponentiatedGradient',d:'An in-processing bias mitigation algorithm (Fairlearn) that trains a model subject to fairness constraints. Finds the best trade-off between accuracy and the chosen fairness metric.',ch:[4]},
  {t:'Explainability',d:'The ability to describe how an AI system arrived at a specific decision in terms that humans can understand. Post-hoc methods (SHAP, LIME) explain individual predictions; mechanistic interpretability explains internal reasoning.',ch:[5]},
  {t:'Fairlearn',d:'Microsoft\'s open-source toolkit for assessing and improving fairness in AI systems. Provides fairness metrics, bias mitigation algorithms (ExponentiatedGradient, ThresholdOptimizer), and visualization tools.',ch:[3,4]},
  {t:'Federated Learning',d:'A training approach where the model goes to the data instead of data going to the model. Clients train on local data and send only model updates (gradients) to a central server. Used by Apple (Siri) and Google (Gboard).',ch:[6]},
  {t:'Frontier AI',d:'The most capable AI systems, typically foundation models trained with massive compute. The EU AI Act uses a 10^25 FLOPs threshold for "systemic risk" classification of general-purpose AI models.',ch:[10]},
  {t:'Gender Shades',d:'A landmark study by Buolamwini & Gebru (2018) that revealed facial recognition systems had error rates of 0.8% for light-skinned men but 34.7% for dark-skinned women — a 43x disparity.',ch:[1,2,9]},
  {t:'Guardrails',d:'Automated input/output filters for LLMs that block harmful content. Input guardrails detect prompt injection and PII; output guardrails check for hallucination, toxicity, and format compliance. Tools: NeMo Guardrails, LlamaGuard.',ch:[7]},
  {t:'Hallucination',d:'When an LLM generates text that is fluent and confident but factually wrong. A fundamental property of language models that predict plausible text, not true text. Mitigated by RAG, grounding, and verification.',ch:[7]},
  {t:'Impossibility Theorem',d:'Proved by Chouldechova (2017): when base rates differ across groups, it is mathematically impossible to simultaneously satisfy demographic parity, equalized odds, and calibration.',ch:[3]},
  {t:'Individual Fairness',d:'A fairness definition requiring that similar individuals receive similar outcomes, regardless of group membership. Requires defining a meaningful distance metric between individuals.',ch:[3]},
  {t:'Interpretability',d:'The degree to which a human can understand the cause of a model\'s decision. Intrinsically interpretable models (linear regression, decision trees) are transparent by design; complex models require post-hoc methods.',ch:[5]},
  {t:'ISO/IEC 42001',d:'The first international standard for AI management systems (2023). Certifiable by third-party auditors. Follows the Plan-Do-Check-Act cycle and complements ISO 27001 (security) and ISO 27701 (privacy).',ch:[8]},
  {t:'k-Anonymity',d:'A privacy technique ensuring that each record in a dataset is indistinguishable from at least k-1 other records. Provides weaker guarantees than differential privacy.',ch:[6]},
  {t:'Liar\'s Dividend',d:'The phenomenon where the existence of deepfakes allows people to dismiss authentic evidence as AI-generated. Real video can be claimed to be fake, undermining journalism, courts, and truth.',ch:[7]},
  {t:'LIME',d:'Local Interpretable Model-Agnostic Explanations — an explainability method that approximates a complex model\'s behavior locally with a simple, interpretable model. Fast but less theoretically grounded than SHAP.',ch:[5]},
  {t:'Machine Unlearning',d:'The process of removing a specific individual\'s contribution from a trained model without retraining from scratch. Approaches include exact unlearning (retrain), approximate unlearning, and SISA training.',ch:[6]},
  {t:'Mechanistic Interpretability',d:'An approach to understanding neural networks at the level of individual neurons and circuits. Anthropic\'s "Microscope" uses sparse autoencoders to decode features and trace information flow in models.',ch:[5,10]},
  {t:'Model Card',d:'A documentation artifact describing a model\'s intended use, training data, performance metrics, limitations, and ethical considerations. Proposed by Mitchell et al. (2019) at Google.',ch:[5]},
  {t:'NIST AI RMF',d:'The US National Institute of Standards and Technology AI Risk Management Framework (v1.0, 2023). Voluntary framework organized around four functions: Govern, Map, Measure, Manage.',ch:[8]},
  {t:'Participatory Design',d:'A design approach that involves the people who will be affected by an AI system in its design process. The principle: "Nothing about us without us." Methods include community workshops and co-design sessions.',ch:[9]},
  {t:'Privacy-by-Design',d:'Building privacy into AI systems from the start rather than bolting it on after. Includes data minimization, encryption, access controls, retention limits, and user rights (access, deletion, portability).',ch:[6]},
  {t:'Red Teaming',d:'Adversarial testing where humans (or other AI) try to make a model produce harmful outputs. Used to find jailbreaks, biases, and safety failures before deployment.',ch:[2,7]},
  {t:'Representation Bias',d:'Bias arising when the training data doesn\'t represent the full diversity of the population the model will serve. Example: facial recognition trained mostly on light-skinned faces fails on dark-skinned faces.',ch:[2]},
  {t:'Responsible AI',d:'An umbrella term for practices that ensure AI systems are fair, transparent, accountable, private, and safe. Encompasses bias mitigation, explainability, privacy, governance, and inclusive design.',ch:[1,9]},
  {t:'RLHF',d:'Reinforcement Learning from Human Feedback — a technique for aligning LLMs with human preferences. Trains a reward model from human comparisons, then fine-tunes the LLM to maximize that reward.',ch:[4,7,10]},
  {t:'SHAP',d:'SHapley Additive exPlanations — an explainability method based on Shapley values from cooperative game theory. Provides theoretically grounded, consistent feature importance scores for individual predictions.',ch:[5]},
  {t:'SISA Training',d:'Sharded, Isolated, Sliced, Aggregated — a training approach that splits data into shards and trains sub-models on each. Enables efficient machine unlearning by retraining only the affected shard.',ch:[6]},
  {t:'Social Scoring',d:'Using AI to assign citizens a score based on their behavior, social connections, or other attributes, with consequences for access to services. Banned under the EU AI Act as an unacceptable risk.',ch:[1,8]},
  {t:'SynthID',d:'Google\'s watermarking technology for AI-generated content. Embeds imperceptible watermarks in images, audio, and text that can be detected later to identify AI-generated content.',ch:[7]},
  {t:'ThresholdOptimizer',d:'A post-processing bias mitigation algorithm (Fairlearn) that adjusts decision thresholds differently for each demographic group to achieve the desired fairness constraint.',ch:[4]},
  {t:'Training Data Extraction',d:'An attack where adversaries extract verbatim training data from ML models through careful prompting. LLMs have been shown to reproduce phone numbers, email addresses, and copyrighted text.',ch:[6,7]}
];

TERMS.sort((a,b)=>a.t.localeCompare(b.t));

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const alphaBar = document.getElementById('alpha-bar');
const body = document.getElementById('glossary-body');
const searchInput = document.getElementById('search-input');
const searchCount = document.getElementById('search-count');
const noResults = document.getElementById('no-results');
const totalCount = document.getElementById('total-count');

totalCount.textContent = `${TERMS.length} Terms`;

ALPHABET.forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  const hasTerms = TERMS.some(t => t.t.toUpperCase().startsWith(letter));
  if(!hasTerms) btn.classList.add('disabled');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('disabled')) return;
    document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    searchInput.value = '';
    buildGlossary(letter, true);
  });
  alphaBar.appendChild(btn);
});

const allBtn = document.createElement('button');
allBtn.className = 'alpha-btn active';
allBtn.style.width = 'auto';
allBtn.style.padding = '0 10px';
allBtn.textContent = 'ALL';
allBtn.addEventListener('click', () => {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  allBtn.classList.add('active');
  searchInput.value = '';
  buildGlossary('');
});
alphaBar.insertBefore(allBtn, alphaBar.firstChild);

function makeRef(chNum) {
  const a = document.createElement('a');
  a.className = 'term-ref';
  a.href = CHAPTERS[chNum] || '#';
  a.textContent = `Ch ${chNum}`;
  return a;
}

function buildGlossary(filter, isExactLetter = false) {
  body.innerHTML = '';
  const f = filter.toLowerCase();
  let filtered = TERMS;
  if(f) {
    if(isExactLetter) {
      filtered = TERMS.filter(t => t.t.toLowerCase().startsWith(f));
    } else {
      filtered = TERMS.filter(t => t.t.toLowerCase().includes(f) || t.d.toLowerCase().includes(f));
      document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    }
  }
  if(filtered.length === 0) {
    noResults.style.display = 'block';
    searchCount.textContent = '0 matches';
    return;
  }
  noResults.style.display = 'none';
  if(f && !isExactLetter) {
    searchCount.textContent = `${filtered.length} match${filtered.length===1?'':'es'}`;
  } else {
    searchCount.textContent = '';
  }
  let currentLetter = '';
  let currentSection = null;
  filtered.forEach(term => {
    const firstLetter = term.t.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter) {
      currentLetter = firstLetter;
      currentSection = document.createElement('div');
      currentSection.className = 'letter-section';
      const h = document.createElement('div');
      h.className = 'letter-head';
      h.textContent = currentLetter;
      currentSection.appendChild(h);
      body.appendChild(currentSection);
    }
    const row = document.createElement('div');
    row.className = 'term-row';
    const name = document.createElement('div');
    name.className = 'term-name';
    name.textContent = term.t;
    const bd = document.createElement('div');
    bd.className = 'term-body';
    const def = document.createElement('div');
    def.className = 'term-def';
    if(f && !isExactLetter) {
      const regex = new RegExp(`(${f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      def.innerHTML = term.d.replace(regex, '<strong>$1</strong>');
      name.innerHTML = term.t.replace(regex, '<strong>$1</strong>');
    } else {
      def.textContent = term.d;
    }
    const refs = document.createElement('div');
    refs.className = 'term-refs';
    term.ch.forEach(c => refs.appendChild(makeRef(c)));
    bd.appendChild(def);
    bd.appendChild(refs);
    row.appendChild(name);
    row.appendChild(bd);
    currentSection.appendChild(row);
  });
}

buildGlossary('');

let debounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => buildGlossary(searchInput.value), 150);
});
</script>
</body>
